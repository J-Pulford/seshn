  <style>
/* Seshn — Wireframe styles */

@import url("https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap");

:root {
  /* Wireframe palette — desaturated, with one accent */
  --bg:        #f4f3ef;     /* canvas */
  --frame:     #ffffff;     /* artboard surface */
  --surface:   #ffffff;     /* card */
  --surface-2: #f7f6f3;     /* recessed */
  --line:      #d8d6d1;     /* primary stroke */
  --line-soft: #ececea;     /* hairlines, grid */
  --ink:       #0d0d0d;     /* primary text */
  --ink-2:     #3a3a38;     /* secondary text */
  --ink-3:     #6e6c66;     /* muted */
  --ink-4:     #a4a29c;     /* very muted, placeholder text */
  --ph:        #ececea;     /* placeholder fill */
  --ph-2:      #e2e0db;     /* placeholder fill (alt) */

  /* Brand */
  --accent:    #2CCB73;     /* primary green */
  --accent-d:  #1C8F56;     /* deep green */
  --accent-m:  #63D89A;     /* mint */
  --accent-bg: #A8EBC8;     /* soft mint */
  --ink-black: #0D0D0D;

  --ok:        #1C8F56;
  --danger:    #c0392b;

  --r-sm: 4px;
  --r:    8px;
  --r-lg: 14px;
  --r-pill: 999px;

  --font-display: "General Sans", "Abizhar", "Inter Tight", ui-sans-serif, system-ui, sans-serif;
  --font-body:    "Satoshi", "Abizhar", "Inter", ui-sans-serif, system-ui, sans-serif;
}

/* Dark frame variant — applied via .dark on the frame root */
.dark {
  --frame:     #0d0d0d;
  --surface:   #161614;
  --surface-2: #1d1d1a;
  --line:      #2a2a26;
  --line-soft: #1f1f1c;
  --ink:       #f4f3ef;
  --ink-2:     #c9c7c1;
  --ink-3:     #8a8880;
  --ink-4:     #5a5852;
  --ph:        #1f1f1c;
  --ph-2:      #262622;
}

/* Reset within wireframe artboards */
.wf, .wf * {
  box-sizing: border-box;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: contextual;
}

.wf {
  background: var(--frame);
  color: var(--ink);
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.45;
}

.wf-mobile {
  font-size: 12.5px;
}

/* ——— Type ——— */
.t-display { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }
.t-h1 { font-family: var(--font-display); font-weight: 600; font-size: 32px; line-height: 1.05; letter-spacing: -0.025em; }
.t-h2 { font-family: var(--font-display); font-weight: 600; font-size: 22px; line-height: 1.15; letter-spacing: -0.02em; }
.t-h3 { font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.2; letter-spacing: -0.01em; }
.t-eyebrow { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
.t-meta { font-size: 11px; color: var(--ink-3); }
.t-muted { color: var(--ink-3); }
.t-mute2 { color: var(--ink-4); }

/* ——— Placeholders ——— */
.ph {
  background: var(--ph);
  border-radius: var(--r-sm);
  color: var(--ink-4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-display);
  font-weight: 500;
  position: relative;
  overflow: hidden;
}
.ph-img::before {
  content: "";
  position: absolute; inset: 0;
  background:
    linear-gradient(to top right, transparent 49.4%, var(--line) 49.7%, var(--line) 50.3%, transparent 50.6%),
    linear-gradient(to top left,  transparent 49.4%, var(--line) 49.7%, var(--line) 50.3%, transparent 50.6%);
  opacity: 0.55;
}
.ph-img > span { position: relative; z-index: 1; background: var(--ph); padding: 2px 6px; border-radius: 3px; }

.ph-line { background: var(--ph); border-radius: 2px; height: 8px; }
.ph-line.sm { height: 6px; }
.ph-line.lg { height: 12px; }
.ph-block { background: var(--ph); border-radius: var(--r-sm); }
.ph-block.soft { background: var(--ph-2); }

/* ——— Pills ——— */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  font-size: 10.5px;
  font-weight: 500;
  font-family: var(--font-display);
  letter-spacing: 0.01em;
  white-space: nowrap;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink-2);
  line-height: 1;
}
.pill.accent { background: var(--accent-bg); border-color: transparent; color: var(--accent-d); }
.pill.solid { background: var(--accent); border-color: transparent; color: #062c19; }
.pill.success { background: transparent; border-color: var(--accent-d); color: var(--accent-d); }
.pill.success::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-d); }
.pill.dark { background: var(--ink); color: var(--frame); border-color: transparent; }
.pill.ghost { background: transparent; }

/* ——— Buttons ——— */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--r);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-display);
  letter-spacing: -0.005em;
  cursor: pointer;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  line-height: 1;
  white-space: nowrap;
}
.btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
.btn.dark { background: var(--ink); color: var(--frame); border-color: transparent; }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
.btn.lg { padding: 12px 20px; font-size: 13px; border-radius: 10px; }
.btn.sm { padding: 6px 10px; font-size: 11px; }
.btn.block { width: 100%; }

/* ——— Inputs ——— */
.input {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--r);
  border: 1px solid var(--line);
  background: var(--surface);
  font-size: 12px;
  font-family: var(--font-body);
  color: var(--ink);
}
.input.lg { padding: 14px 14px; }

/* ——— Avatar ——— */
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--ph);
  position: relative;
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 12px;
  color: var(--ink-3);
}
.avatar.sm { width: 22px; height: 22px; font-size: 9px; }
.avatar.lg { width: 56px; height: 56px; font-size: 18px; }
.avatar.xl { width: 88px; height: 88px; font-size: 24px; }
.avatar > .role-dot {
  position: absolute;
  bottom: -2px; right: -2px;
  background: var(--frame);
  border-radius: var(--r-pill);
  padding: 2px 5px;
  font-size: 8px;
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink);
  border: 1px solid var(--line);
  line-height: 1;
  text-transform: uppercase;
}

/* ——— Card ——— */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px;
}
.card.flat { background: transparent; }
.card.hairline { border-color: var(--line-soft); }

/* ——— Gig card ——— */
.gig {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.gig.boost {
  border-color: var(--accent-d);
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent-bg) 40%, var(--surface)) 0%, var(--surface) 60%);
}
.gig-head { display: flex; align-items: center; gap: 10px; }
.gig-title { font-family: var(--font-display); font-weight: 600; font-size: 16px; letter-spacing: -0.012em; line-height: 1.2; }
.gig-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.gig-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: 10px; border-top: 1px solid var(--line-soft); }

/* ——— Audio embed wrapper ——— */
.audio {
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: var(--surface);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.audio .play {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
  position: relative;
}
.audio .play::before {
  content: ""; width: 0; height: 0;
  border-left: 8px solid var(--accent);
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  margin-left: 3px;
}
.audio .play.playing::before {
  border: none;
  width: 8px; height: 9px; margin: 0;
  background:
    linear-gradient(var(--accent), var(--accent)) left/2px 100% no-repeat,
    linear-gradient(var(--accent), var(--accent)) right/2px 100% no-repeat;
}
.audio.compact { padding: 6px 8px; gap: 8px; }
.audio.compact .play { width: 22px; height: 22px; }
.audio.compact .play::before { border-left-width: 6px; border-top-width: 4px; border-bottom-width: 4px; }
.audio .meta { font-size: 10.5px; color: var(--ink-3); display: flex; gap: 1px; min-width: 0; }
.audio .meta b { color: var(--ink); font-weight: 600; font-family: var(--font-display); font-size: 12px; }
.audio.compact .meta b { font-size: 11px; }

/* ——— Misc ——— */
.divider { height: 1px; background: var(--line-soft); }
.divider-v { width: 1px; background: var(--line-soft); align-self: stretch; }
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; }
.between { display: flex; align-items: center; justify-content: space-between; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-4); }

/* Browser chrome */
.chrome {
  height: 38px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
}
.chrome .dots { display: flex; gap: 6px; }
.chrome .dots span { width: 10px; height: 10px; border-radius: 50%; background: var(--ph-2); }
.chrome .url {
  flex: 1; height: 22px; background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--r-pill);
  display: flex; align-items: center; padding: 0 10px;
  font-size: 10.5px; color: var(--ink-3); font-family: var(--font-display);
}

/* Phone chrome */
.phone-bar {
  height: 28px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
}
.phone-bar .right { display: flex; gap: 5px; align-items: center; }
.phone-bar .right span { width: 14px; height: 8px; background: var(--ink); border-radius: 2px; }
.phone-bar .right span.signal { background: linear-gradient(to top right, var(--ink) 60%, transparent 60%); }
.phone-bar .right span.battery { width: 22px; border: 1px solid var(--ink); background: transparent; position: relative; }
.phone-bar .right span.battery::after {
  content: ""; position: absolute; inset: 1.5px; background: var(--ink);
  width: 70%;
}

.tabbar {
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 64px;
  border-top: 1px solid var(--line);
  background: var(--surface);
  display: grid; grid-template-columns: repeat(5, 1fr);
  align-items: center;
  padding-bottom: 8px;
}
.tabbar .t {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: var(--font-display);
  font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-3);
}
.tabbar .t.active { color: var(--ink); }
.tabbar .t .ic { width: 20px; height: 20px; border-radius: 5px; background: var(--ph); }
.tabbar .t.active .ic { background: var(--ink); }
.tabbar .t.post .ic { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); }

/* Logo */
.logo {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.04em;
  font-size: 18px;
  color: var(--ink);
  display: inline-flex; align-items: center; gap: 6px;
}
.logo::before {
  content: "";
  width: 14px; height: 14px;
  border-radius: 3px;
  background: var(--accent);
  display: inline-block;
  box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink);
  margin-right: 2px;
}

/* Section labels above wireframes */
.dc-section-title { font-family: var(--font-display) !important; }

  </style>
  <style>
/* Seshn — landing page styles (additive on top of styles.css) */

:root {
  --land-bg: #0d0d0d;
  --land-surface: #161614;
  --land-surface-2: #1d1d1a;
  --land-line: #25251f;
  --land-ink: #f4f3ef;
  --land-ink-2: #c9c7c1;
  --land-ink-3: #8a8880;
}

html, body { margin: 0; padding: 0; background: var(--land-bg); }
body {
  font-family: var(--font-body);
  color: var(--land-ink);
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: contextual;
}
* { box-sizing: border-box; }

.land {
  background: var(--land-bg);
  color: var(--land-ink);
  min-height: 100vh;
}

/* Section spacing */
.land-section { padding: 90px 0; position: relative; }
.land-section.tight { padding: 60px 0; }
.land-container { max-width: 1240px; margin: 0 auto; padding: 0 28px; position: relative; }

/* Nav */
.land-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13, 13, 13, 0.75);
  backdrop-filter: saturate(1.4) blur(20px);
  -webkit-backdrop-filter: saturate(1.4) blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.land-nav-inner {
  max-width: 1240px; margin: 0 auto; padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 32px;
}
.land-nav .links { display: flex; gap: 28px; align-items: center; }
.land-nav a {
  color: var(--land-ink-2); text-decoration: none;
  font-family: var(--font-display); font-weight: 500; font-size: 14px;
  transition: color .15s;
}
.land-nav a:hover { color: var(--land-ink); }
.land-logo, .land .logo { color: var(--land-ink); }

/* Hero */
.hero {
  padding: 110px 0 60px;
  position: relative;
  overflow: hidden;
}
.hero-grid {
  display: grid; grid-template-columns: 1.05fr 1fr; gap: 60px; align-items: center;
}
.hero h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 80px;
  line-height: 0.95;
  letter-spacing: -0.04em;
  margin: 18px 0 22px;
  color: var(--land-ink);
}
.hero h1 .accent { color: var(--accent); }
.hero p.sub {
  font-size: 18px; line-height: 1.5;
  color: var(--land-ink-2);
  margin: 0 0 28px;
  max-width: 480px;
}
.hero .cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.hero .stat-row {
  display: flex; gap: 22px; align-items: center; flex-wrap: wrap;
  padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.08);
}
.hero .stat-row .stat { display: flex; flex-direction: column; }
.hero .stat-row .stat b { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.hero .stat-row .stat span { font-size: 11.5px; color: var(--land-ink-3); }

.hero .glow {
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(44,203,115,0.18) 0%, transparent 55%);
  top: -300px; right: -200px;
  pointer-events: none;
  filter: blur(10px);
}

/* Button overrides for dark theme */
.land .btn { font-family: var(--font-display); font-weight: 600; padding: 12px 18px; border-radius: 10px; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.14); background: transparent; color: var(--land-ink); letter-spacing: -0.005em; transition: all .15s; }
.land .btn.lg { padding: 16px 24px; font-size: 14px; border-radius: 12px; }
.land .btn:hover { background: rgba(255,255,255,0.06); }
.land .btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
.land .btn.primary:hover { background: var(--accent-m); }
.land .btn.ghost { border-color: transparent; color: var(--land-ink-2); }

/* Trust strip */
.trust {
  border-top: 1px solid rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  padding: 22px 0;
}
.trust-inner {
  max-width: 1240px; margin: 0 auto; padding: 0 28px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px;
}
.trust-item { display: flex; flex-direction: column; gap: 4px; }
.trust-item b { font-family: var(--font-display); font-size: 32px; font-weight: 700; letter-spacing: -0.03em; color: var(--land-ink); line-height: 1; }
.trust-item span { font-size: 12px; color: var(--land-ink-3); }
.trust-item .green { color: var(--accent); }

/* Section headers */
.sec-head { max-width: 720px; margin: 0 auto 60px; text-align: center; }
.sec-head .eyebrow {
  display: inline-block;
  font-family: var(--font-display); font-weight: 500; letter-spacing: 0.14em;
  font-size: 11px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 14px;
}
.sec-head h2 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 48px; line-height: 1.02; letter-spacing: -0.03em;
  margin: 0 0 14px; color: var(--land-ink);
}
.sec-head p { font-size: 16px; line-height: 1.55; color: var(--land-ink-2); margin: 0; }

/* Steps */
.steps { display: flex; flex-direction: column; gap: 90px; }
.step {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.step.reverse { direction: rtl; }
.step.reverse > * { direction: ltr; }
.step .text .num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 14px; letter-spacing: 0.16em;
  color: var(--accent);
  display: inline-block; margin-bottom: 14px;
}
.step .text h3 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 38px; line-height: 1.05; letter-spacing: -0.025em;
  margin: 0 0 14px; color: var(--land-ink);
}
.step .text p { font-size: 15px; line-height: 1.55; color: var(--land-ink-2); margin: 0 0 20px; max-width: 440px; }
.step .text ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.step .text ul li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--land-ink-2); }
.step .text ul li::before {
  content: "✓"; color: var(--accent);
  flex: 0 0 18px; font-family: var(--font-display); font-weight: 700;
}

.step .anim {
  position: relative;
  padding: 14px;
  background: linear-gradient(180deg, rgba(44,203,115,0.05), transparent 60%);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5);
}

/* Feature grid */
.feat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.feat-card {
  background: var(--land-surface);
  border: 1px solid var(--land-line);
  border-radius: 18px;
  padding: 26px;
  display: flex; flex-direction: column; gap: 14px;
  min-height: 320px;
  transition: transform .25s, border-color .25s;
}
.feat-card:hover { transform: translateY(-3px); border-color: rgba(44,203,115,0.4); }
.feat-card h4 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 20px; line-height: 1.1; letter-spacing: -0.015em;
  margin: 0; color: var(--land-ink);
}
.feat-card p { font-size: 13.5px; line-height: 1.5; color: var(--land-ink-3); margin: 0; }
.feat-card .anim-slot { height: 92px; display: flex; align-items: center; }

/* Project room deep feature */
.deep {
  display: grid; grid-template-columns: 1fr 1.2fr; gap: 64px; align-items: center;
}
.deep .text h3 { font-family: var(--font-display); font-weight: 700; font-size: 44px; line-height: 1.02; letter-spacing: -0.03em; margin: 18px 0 18px; color: var(--land-ink); }
.deep .text p { font-size: 15.5px; line-height: 1.55; color: var(--land-ink-2); margin: 0 0 24px; max-width: 460px; }
.deep .mock {
  position: relative;
  padding: 14px;
  background: var(--land-surface);
  border: 1px solid var(--land-line);
  border-radius: 18px;
  box-shadow: 0 40px 80px -30px rgba(0,0,0,0.7);
}

/* Testimonials */
.tests-wrap {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.test-card {
  background: var(--land-surface);
  border: 1px solid var(--land-line);
  border-radius: 16px;
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;

  overflow: hidden;
}
.test-card .quote { font-size: 15px; line-height: 1.5; color: var(--land-ink); }
.test-card .quote::before {
  content: "“"; font-family: var(--font-display); font-weight: 700;
  font-size: 48px; color: var(--accent);

}
.test-card .who { display: flex; gap: 10px; align-items: center; }
.test-card .who .col { display: flex; flex-direction: column; gap: 2px; }
.test-card .who b { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--land-ink); }
.test-card .who span { font-size: 11.5px; color: var(--land-ink-3); }

/* Pricing */
.price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; max-width: 880px; margin: 0 auto; }
.price-card {
  background: var(--land-surface);

}
.price-card.pro {
  background: linear-gradient(160deg, rgba(44,203,115,0.18) 0%, var(--land-surface) 40%);
  border-color: rgba(44,203,115,0.5);
  position: relative;
  overflow: hidden;
}
.price-card .price { display: flex; align-items: baseline; gap: 6px; }
.price-card .price b { font-family: var(--font-display); font-weight: 700; font-size: 52px; letter-spacing: -0.04em; line-height: 1; color: var(--land-ink); }
.price-card .price span { color: var(--land-ink-3); font-size: 14px; }
.price-card ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; color: var(--land-ink-2); }
.price-card ul li { display: flex; align-items: center; gap: 10px; }
.price-card ul li::before { content: "✓"; color: var(--accent); font-weight: 700; }

/* FAQ */
.faq { max-width: 760px; margin: 0 auto; }
.faq-item {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 22px 0;
  cursor: pointer;
}
.faq-item summary {
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
  font-family: var(--font-display); font-weight: 600; font-size: 17px;
  color: var(--land-ink); list-style: none;
}
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary::after {
  content: "+"; font-family: var(--font-display); color: var(--accent); font-size: 22px;
  transition: transform .2s;
}
.faq-item[open] summary::after { content: "−"; }
.faq-item .ans { padding-top: 14px; font-size: 14px; line-height: 1.6; color: var(--land-ink-2); max-width: 600px; }

/* Final CTA */
.final-cta {
  background: linear-gradient(180deg, var(--land-surface) 0%, var(--land-bg) 100%);
  padding: 110px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.final-cta::before {
  content: "";
  position: absolute; left: 50%; top: 0; transform: translateX(-50%);
  width: 1200px; height: 600px;
  background: radial-gradient(ellipse, rgba(44,203,115,0.22) 0%, transparent 60%);
  pointer-events: none;
}
.final-cta h2 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 64px; line-height: 1.0; letter-spacing: -0.035em;

}
.final-cta p { font-size: 17px; color: var(--land-ink-2); margin: 0 0 28px; position: relative; }
.final-cta form {

}
.final-cta input {
  background: transparent; border: none; outline: none;
  color: var(--land-ink); padding: 12px 14px; min-width: 260px;

}
.final-cta input::placeholder { color: var(--land-ink-3); }

/* Footer */
.footer {

  padding: 50px 0 32px;
  color: var(--land-ink-3);

}
.footer-inner { max-width: 1240px; margin: 0 auto; padding: 0 28px; display: flex; justify-content: space-between; gap: 28px; flex-wrap: wrap; }
.footer-cols { display: flex; gap: 50px; flex-wrap: wrap; }
.footer-col { display: flex; flex-direction: column; gap: 8px; }
.footer-col b { font-family: var(--font-display); font-weight: 600; font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--land-ink); margin-bottom: 4px; }
.footer-col a { color: var(--land-ink-3); text-decoration: none; }
.footer-col a:hover { color: var(--land-ink); }
.footer .bottom { max-width: 1240px; margin: 32px auto 0; padding: 18px 28px 0; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; gap: 28px; }

/* Problem section */
.problem {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%);
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.problem-intro { max-width: 820px; margin: 0 auto 50px; text-align: center; }
.problem-intro h2 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 60px; line-height: 1.0; letter-spacing: -0.038em;

.stat-grid {

.stat-card {
  background: var(--land-surface);

  border-radius: 18px;
  padding: 32px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative;
}
.stat-card .big {
  font-family: var(--font-display); font-weight: 700;
  font-size: 72px; line-height: 0.95; letter-spacing: -0.04em;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.stat-card .big.danger { color: #e76f51; }
.stat-card .big.ink { color: var(--land-ink); }
.stat-card h3 {

.problem-quote .line {
  font-family: var(--font-display); font-weight: 600;
  font-size: 28px; line-height: 1.2; letter-spacing: -0.02em;
  color: var(--land-ink); margin: 0 0 6px;

@media (max-width: 920px) {

}

/* Animations */
@keyframes seshn-caret { from { opacity: 1; } to { opacity: 0; } }

/* Ensure components inside light-card animations stay readable */
.land .gig, .land .audio, .land .card { color: var(--ink); }
.land .land-anim-card { color: var(--ink); }
@keyframes seshn-pop {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes seshn-pop-in {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes seshn-float-a {
  0%, 100% { transform: translate(0, 0) rotate(6deg); }
  50% { transform: translate(-4px, -8px) rotate(8deg); }
}
@keyframes seshn-float-b {
  0%, 100% { transform: translate(0, 0) rotate(-5deg); }
  50% { transform: translate(4px, 6px) rotate(-3deg); }

@keyframes seshn-fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: seshn-fade-up 0.7s cubic-bezier(.2,.7,.3,1) both; }

/* Reveal-on-scroll observer trigger */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s, transform .7s; }
.reveal.in { opacity: 1; transform: translateY(0); }

/* Responsive */
@media (max-width: 920px) {
  .hero-grid, .step, .deep { grid-template-columns: 1fr; gap: 30px; }

  .hero h1 { font-size: 52px; }
  .sec-head h2 { font-size: 36px; }
  .feat-grid, .tests-wrap { grid-template-columns: 1fr; }
  .price-grid { grid-template-columns: 1fr; }
  .trust-inner { grid-template-columns: repeat(2, 1fr); }
  .final-cta h2 { font-size: 42px; }

}

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
// Seshn — visuals: procedural album covers, real waveforms, instrument illustrations,
// sticker badges, marquee, vinyl, cassette, grain texture, cover headers.

// ──────────────────────────────────────────────────────────────
// Palette — editorial accents that complement the brand greens.
// Cover-art swatches and decorative backgrounds.
const V_PAL = {
  cream:   "#f0e8d6",
  bone:    "#f4f1e9",
  rust:    "#d96e3f",
  plum:    "#5b3858",
  forest:  "#2a4d3a",
  ink:     "#0d0d0d",
  navy:    "#1f3a5f",
  mint:    "#a8ebc8",
  lime:    "#c4e83a",
  cherry:  "#c43d3f",
  green:   "#2CCB73",
  deep:    "#1C8F56",
  butter:  "#f6d36b",
  fog:     "#c9d3d2",
};

// Curated cover-art palettes (bg, fg, accent) — chosen for harmony.
const COVER_PALETTES = [
  [V_PAL.plum,   V_PAL.cream,  V_PAL.rust],
  [V_PAL.cream,  V_PAL.ink,    V_PAL.rust],
  [V_PAL.forest, V_PAL.mint,   V_PAL.butter],
  [V_PAL.navy,   V_PAL.bone,   V_PAL.butter],
  [V_PAL.ink,    V_PAL.lime,   V_PAL.mint],
  [V_PAL.cherry, V_PAL.cream,  V_PAL.ink],
  [V_PAL.bone,   V_PAL.plum,   V_PAL.rust],
  [V_PAL.rust,   V_PAL.cream,  V_PAL.ink],
  [V_PAL.green,  V_PAL.ink,    V_PAL.bone],
  [V_PAL.mint,   V_PAL.forest, V_PAL.ink],
];

// Deterministic hash → 32-bit
function _hash(s) {
  let h = 2166136261 >>> 0;
  s = String(s || "x");
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function _rng(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ──────────────────────────────────────────────────────────────
// AlbumArt — procedural SVG cover art seeded by `seed` (title string).
// Variants: 0 sun-disc · 1 halftone · 2 big-initial · 3 waveform-poster
//           4 sliced · 5 orbit · 6 stack · 7 horizon
const AlbumArt = ({ seed = "track", size = 56, variant, radius = 6, style, initial }) => {
  const h = _hash(seed);
  const v = variant != null ? variant : h % 8;
  const pal = COVER_PALETTES[((h >>> 3) % COVER_PALETTES.length)];
  const bg = pal[0], fg = pal[1], ac = pal[2];
  const rng = _rng(h);

  const wrap = {
    width: size, height: size,
    borderRadius: radius,
    overflow: "hidden",
    flex: "0 0 auto",
    display: "inline-block",
    ...style,
  };

  let inner;
  if (v === 0) {
    // Sun disc + horizon line
    const cx = 50, cy = 38 + (rng() - 0.5) * 16;
    inner = (
      <svg viewBox="0 0 100 100" style={{ display: "block" }} width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        <circle cx={cx} cy={cy} r={26} fill={ac} />
        <rect x="0" y="68" width="100" height="6" fill={fg} />
        <rect x="0" y="78" width="100" height="2" fill={fg} opacity="0.45" />
      </svg>
    );
  } else if (v === 1) {
    // Halftone gradient — dots fade across diagonal
    const dots = [];
    for (let y = 0; y < 10; y++)
      for (let x = 0; x < 10; x++) {
        const d = (x + y) / 18; // 0..1
        const r = Math.max(0.4, 4.2 * (1 - d) + rng() * 0.4);
        dots.push(<circle key={x + "_" + y} cx={5 + x * 10} cy={5 + y * 10} r={r} fill={fg} />);
      }
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        {dots}
      </svg>
    );
  } else if (v === 2) {
    // Big initial — display letter
    const letter = (initial || seed[0] || "S").toUpperCase();
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        <text x="50" y="72" textAnchor="middle"
          fontFamily="var(--font-display)" fontWeight="700" fontSize="86"
          letterSpacing="-3" fill={fg}>{letter}</text>
        <rect x="14" y="84" width="72" height="4" fill={ac} />
      </svg>
    );
  } else if (v === 3) {
    // Waveform poster
    const bars = [];
    for (let i = 0; i < 28; i++) {
      const t = i / 27;
      const env = Math.sin(t * Math.PI) ** 0.6;
      const a = 10 + rng() * 80 * env;
      bars.push(<rect key={i} x={5 + i * 3.4} y={50 - a / 2} width="2" height={a} fill={fg} rx="1" />);
    }
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        {bars}
        <rect x="6" y="86" width="40" height="2" fill={ac} />
      </svg>
    );
  } else if (v === 4) {
    // Sliced diagonal half + circle on the seam
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        <polygon points="0,0 100,0 0,100" fill={fg} />
        <circle cx="50" cy="50" r="18" fill={ac} />
      </svg>
    );
  } else if (v === 5) {
    // Orbit — concentric rings + offset dot
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        {[36, 26, 16].map((r, i) => (
          <circle key={i} cx="50" cy="50" r={r} fill="none" stroke={fg} strokeWidth={i === 1 ? 2 : 1.2} opacity={0.85 - i * 0.1} />
        ))}
        <circle cx={50 + 36 * Math.cos(((h >>> 5) % 360) * Math.PI / 180)}
                cy={50 + 36 * Math.sin(((h >>> 5) % 360) * Math.PI / 180)} r="5" fill={ac} />
      </svg>
    );
  } else if (v === 6) {
    // Stack — three offset blocks like overlapping LPs
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill={bg} />
        <rect x="18" y="22" width="58" height="58" fill={ac} />
        <rect x="26" y="30" width="58" height="58" fill={fg} opacity="0.85" />
        <rect x="34" y="38" width="58" height="58" fill={ac} opacity="0.6" />
      </svg>
    );
  } else {
    // 7 — Horizon — sky/land split with sun
    inner = (
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="55" fill={bg} />
        <rect y="55" width="100" height="45" fill={fg} />
        <circle cx="50" cy="55" r="20" fill={ac} />
        <rect x="0" y="55" width="100" height="1.5" fill={ac} opacity="0.4" />
      </svg>
    );
  }

  return <div style={wrap} aria-hidden="true">{inner}</div>;
};

// ──────────────────────────────────────────────────────────────
// Waveform — SVG waveform with optional playhead progress.
const Waveform = ({ seed = "wf", height = 28, bars = 56, progress = 0.32, color, played, compact, style }) => {
  const h = _hash(seed);
  const rng = _rng(h);
  const arr = [];
  for (let i = 0; i < bars; i++) {
    const t = i / (bars - 1);
    // gentle envelope so it looks musical, not random
    const env = 0.35 + 0.65 * (Math.sin(t * Math.PI) ** 0.6);
    const a = (0.18 + 0.82 * rng()) * env;
    arr.push(a);
  }
  const W = bars * (compact ? 2.4 : 3);
  const gap = compact ? 1 : 1.2;
  const bw = (W / bars) - gap;
  const playedColor = played || "var(--ink)";
  const restColor = color || "rgba(0,0,0,0.22)";
  return (
    <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none"
      width="100%" height={height} style={{ display: "block", ...style }}>
      {arr.map((a, i) => {
        const x = i * (W / bars);
        const bh = Math.max(2, a * height);
        const y = (height - bh) / 2;
        const isPlayed = (i / bars) < progress;
        return <rect key={i} x={x} y={y} width={bw} height={bh}
          fill={isPlayed ? playedColor : restColor} rx={bw / 2} />;
      })}
    </svg>
  );
};

// ──────────────────────────────────────────────────────────────
// Marquee — horizontal scrolling ticker
const Marquee = ({ items = [], speed = 60, sep = "✶", style, dark }) => {
  // duplicate items so the loop seam is invisible
  const doubled = [...items, ...items];
  return (
    <div style={{
      overflow: "hidden",
      borderTop: "1px solid var(--line)",
      borderBottom: "1px solid var(--line)",
      background: dark ? "var(--ink-black)" : "var(--surface)",
      color: dark ? "var(--frame)" : "var(--ink)",
      ...style,
    }}>
      <div style={{
        display: "flex",
        whiteSpace: "nowrap",
        animation: `seshn-marquee ${speed}s linear infinite`,
        willChange: "transform",
      }}>
        {doubled.map((it, i) => (
          <div key={i} style={{
            display: "inline-flex", alignItems: "center", gap: 14,
            padding: "10px 22px",
            fontFamily: "var(--font-display)", fontSize: 13, fontWeight: 500, letterSpacing: "-0.005em",
          }}>
            <span>{it}</span>
            <span style={{ color: dark ? "var(--accent)" : "var(--accent-d)", fontSize: 11 }}>{sep}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// ──────────────────────────────────────────────────────────────
// Sticker — small rotated badge, hand-placed feel
const Sticker = ({ children, rot = -4, color = "accent", style, size = "md" }) => {
  const colors = {
    accent: { bg: "var(--accent)", fg: "#062c19" },
    ink:    { bg: "var(--ink)", fg: "var(--frame)" },
    cream:  { bg: V_PAL.cream, fg: "var(--ink)" },
    rust:   { bg: V_PAL.rust, fg: "var(--bone)" },
  };
  const c = colors[color] || colors.accent;
  const pad = size === "sm" ? "4px 10px" : "6px 12px";
  return (
    <span style={{
      display: "inline-block",
      transform: `rotate(${rot}deg)`,
      padding: pad,
      borderRadius: 4,
      background: c.bg,
      color: c.fg,
      fontFamily: "var(--font-display)", fontWeight: 700,
      fontSize: size === "sm" ? 10 : 12,
      letterSpacing: "0.04em",
      textTransform: "uppercase",
      boxShadow: "0 6px 14px rgba(0,0,0,0.15), 0 1px 0 rgba(0,0,0,0.08)",
      ...style,
    }}>{children}</span>
  );
};

// ──────────────────────────────────────────────────────────────
// Vinyl — decorative SVG
const Vinyl = ({ size = 44, color = "var(--ink)", label = "var(--accent)", style }) => (
  <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: "block", ...style }}>
    <circle cx="50" cy="50" r="48" fill={color} />
    <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="0.5" />
    <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="0.5" />
    <circle cx="50" cy="50" r="20" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="0.5" />
    <circle cx="50" cy="50" r="14" fill={label} />
    <circle cx="50" cy="50" r="2" fill={color} />

      <span key={i} style={{ position: "relative", width: size, height: size, display: "inline-block" }}>
        <svg viewBox="0 0 24 24" width={size} height={size} style={{ position: "absolute", inset: 0 }}>
          <path d="M12 3l2.7 6 6.3.6-4.8 4.2L17.6 20 12 16.7 6.4 20l1.5-6.2L3 9.6 9.3 9z" fill="none" stroke={color} strokeWidth="1.5" />
        </svg>
        <span style={{ position: "absolute", inset: 0, overflow: "hidden", width: `${fill * 100}%` }}>
          <svg viewBox="0 0 24 24" width={size} height={size}>
            <path d="M12 3l2.7 6 6.3.6-4.8 4.2L17.6 20 12 16.7 6.4 20l1.5-6.2L3 9.6 9.3 9z" fill={color} />
          </svg>
        </span>
      </span>
    );
  }
  return <span style={{ display: "inline-flex", gap: 2 }}>{stars}</span>;
};

  <script type="text/babel">
// Seshn — animated scenes for the landing page.
// Lottie-style inline SVG/CSS animations — no JSON needed; swap in real
// Lottie files later by replacing each <X /> with <lottie-player src=… />.

const { Logo, Pill, Avatar, Btn, Input, Icon, GigCard, Audio } = window.SeshnAtoms;
const { AlbumArt, Waveform, Sticker } = window.SeshnVisuals;

// ────────────────────────────────────────────────────
// HOOK · loop a sequence of steps with a step duration
function useLoopStep(stepCount, stepMs = 1400) {
  const [s, setS] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setS(x => (x + 1) % stepCount), stepMs);
    return () => clearInterval(t);
  }, [stepCount, stepMs]);
  return s;
}

// ────────────────────────────────────────────────────
// HERO — Network of musicians connecting.
// Nodes pulse, edges animate in, audio pulses travel along edges.
const NetworkAnim = ({ width = 540, height = 460 }) => {
  // Node layout — 6 musicians in a circle + one center "you"
  const NODES = [
    { id: "you",   x: 0.50, y: 0.50, ini: "YT", role: "you", r: 36, you: true },
    { id: "maya",  x: 0.16, y: 0.22, ini: "MO", role: "PROD" },
    { id: "nia",   x: 0.82, y: 0.20, ini: "NK", role: "VOC" },
    { id: "theo",  x: 0.90, y: 0.66, ini: "TB", role: "DRM" },
    { id: "sam",   x: 0.60, y: 0.88, ini: "SP", role: "MIX" },
    { id: "lina",  x: 0.18, y: 0.82, ini: "LV", role: "PROD" },
    { id: "ivan",  x: 0.08, y: 0.52, ini: "IR", role: "GTR" },
  ];
  const EDGES = [
    ["you", "maya"], ["you", "nia"], ["you", "theo"],
    ["you", "sam"], ["you", "lina"], ["you", "ivan"],
    ["maya", "nia"], ["nia", "theo"], ["theo", "sam"], ["sam", "lina"], ["lina", "ivan"], ["ivan", "maya"],
  ];
  const W = width, H = height;
  const nodeMap = Object.fromEntries(NODES.map(n => [n.id, { ...n, X: n.x * W, Y: n.y * H }]));

  // Animated time tick for pulse positions
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    let raf, start = performance.now();
    const step = () => {
      setT((performance.now() - start) / 1000);
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <div style={{ position: "relative", width: "100%", height, maxWidth: width, margin: "0 auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ overflow: "visible" }}>
        <defs>
          <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="rgba(44,203,115,0.35)" />
            <stop offset="60%" stopColor="rgba(44,203,115,0.06)" />
            <stop offset="100%" stopColor="rgba(44,203,115,0)" />
          </radialGradient>
          <filter id="softblur"><feGaussianBlur stdDeviation="0.6" /></filter>
        </defs>

        {/* Central glow */}
        <circle cx={W * 0.5} cy={H * 0.5} r={W * 0.4} fill="url(#centerGlow)" />

        {/* Subtle concentric rings */}
        {[0.18, 0.28, 0.38].map((r, i) => (
          <circle key={i} cx={W * 0.5} cy={H * 0.5} r={W * r}
            fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1"
            strokeDasharray="2 4" />
        ))}

        {/* Edges */}
        {EDGES.map(([a, b], i) => {
          const A = nodeMap[a], B = nodeMap[b];
          // Travelling pulse position (0..1) — offset per edge so they're staggered
          const period = 3.5;
          const offset = (i * 0.31) % 1;
          const u = ((t / period) + offset) % 1;
          const px = A.X + (B.X - A.X) * u;
          const py = A.Y + (B.Y - A.Y) * u;
          const isHub = a === "you" || b === "you";
          return (
            <g key={i}>
              <line x1={A.X} y1={A.Y} x2={B.X} y2={B.Y}
                stroke={isHub ? "rgba(44,203,115,0.35)" : "rgba(255,255,255,0.08)"}
                strokeWidth={isHub ? 1.4 : 1} strokeLinecap="round"
                strokeDasharray={isHub ? "0" : "3 4"} />
              {/* Pulse dot */}
              <circle cx={px} cy={py} r={isHub ? 3.5 : 2.5}
                fill={isHub ? "#2CCB73" : "rgba(255,255,255,0.7)"}>
                <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite" />
              </circle>
            </g>
          );
        })}

        {/* Nodes */}
        {NODES.map((n, i) => {
          const nm = nodeMap[n.id];
          const breathe = 1 + 0.04 * Math.sin(t * 1.4 + i);
          return (
            <g key={n.id} transform={`translate(${nm.X} ${nm.Y}) scale(${breathe})`}>
              {n.you && (
                <circle r={n.r + 12} fill="none" stroke="rgba(44,203,115,0.35)" strokeWidth="1.2" strokeDasharray="3 5">
                  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite" />
                </circle>
              )}
              <circle r={n.r || 26} fill={n.you ? "var(--accent)" : "var(--surface)"}
                stroke={n.you ? "transparent" : "rgba(255,255,255,0.15)"} strokeWidth="1" />
              <text y="5" textAnchor="middle"
                fontFamily="var(--font-display)" fontWeight="700" fontSize={n.you ? 16 : 13}
                fill={n.you ? "#062c19" : "var(--ink)"}>{n.ini}</text>
              {!n.you && (
                <g transform={`translate(${(n.r || 26) - 4} ${(n.r || 26) - 14})`}>
                  <rect x="-13" y="-7" width="30" height="14" rx="7" fill="var(--ink)" />
                  <text y="3" textAnchor="middle" fontFamily="var(--font-display)" fontWeight="600"
                    fontSize="8" letterSpacing="0.06em" fill="var(--frame)">{n.role}</text>
                </g>
              )}
            </g>
          );
        })}

        {/* Audio waveform tag on you-node */}
        <g transform={`translate(${W * 0.5} ${H * 0.5 + 56})`}>
          <rect x="-44" y="-12" width="88" height="22" rx="11" fill="var(--ink)" />
          {Array.from({ length: 16 }).map((_, i) => {
            const env = 0.3 + 0.7 * Math.abs(Math.sin(t * 6 + i * 0.7));
            const h = 4 + env * 10;
            return <rect key={i} x={-38 + i * 5} y={-h / 2} width="2" height={h}
              rx="1" fill="var(--accent)" />;
          })}
        </g>
      </svg>

      {/* Floating album-art accents */}
      <div style={{ position: "absolute", top: 10, right: 10, transform: "rotate(6deg)", animation: "seshn-float-a 6s ease-in-out infinite" }}>
        <AlbumArt seed="hero-1" size={64} radius={6} />
      </div>
      <div style={{ position: "absolute", bottom: 20, left: 0, transform: "rotate(-5deg)", animation: "seshn-float-b 7s ease-in-out infinite" }}>
        <AlbumArt seed="hero-2" size={52} radius={6} />
      </div>
    </div>
  );
};

const FeatPaid = () => {
  const [n, setN] = React.useState(0);
  const ref = React.useRef(null);
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && setInView(true)), { threshold: 0.5 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  React.useEffect(() => {
    if (!inView) return;
    const target = 4724, dur = 1700;
    const easeOut = (t) => 1 - Math.pow(1 - t, 3);
    let raf, holdT;
    const start = (t0) => {
      const startTime = performance.now();
      const tick = () => {
        const u = Math.min(1, (performance.now() - startTime) / dur);
        setN(Math.floor(target * easeOut(u)));
        if (u < 1) {
          raf = requestAnimationFrame(tick);
        } else {
          // Hold 3 seconds, then reset and loop.
          holdT = setTimeout(() => { setN(0); start(); }, 3000);
        }
      };
      raf = requestAnimationFrame(tick);
    };
    start();
    return () => { cancelAnimationFrame(raf); clearTimeout(holdT); };
  }, [inView]);
  return (
    <div ref={ref} className="row" style={{ gap: 8, alignItems: "baseline" }}>
      <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 28, letterSpacing: "-0.02em", fontVariantNumeric: "tabular-nums" }}>${n.toLocaleString()}</span>
      <span className="t-meta">paid out this week</span>
    </div>
  );
};

      })}
    </div>
  );
};

const Reveal = ({ children, delay = 0, style }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add("in"), delay);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [delay]);
  return <div ref={ref} className="reveal" style={style}>{children}</div>;
};
