<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seshn — My applications</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ef; --frame: #ffffff; --surface: #ffffff; --surface-2: #f7f6f3;
      --line: #d8d6d1; --line-soft: #ececea; --ink: #0d0d0d; --ink-2: #3a3a38;
      --ink-3: #6e6c66; --ink-4: #a4a29c;
      --accent: #2CCB73; --accent-d: #1C8F56; --accent-bg: #A8EBC8;
      --cherry: #c43d3f;
      --r: 8px; --r-lg: 14px; --r-pill: 999px;
      --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
    }
    html, body { background: var(--bg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; color: var(--ink); }

    .logo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 20px; color: var(--ink); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo::before { content: ""; width: 14px; height: 14px; border-radius: 3px; background: var(--accent); display: inline-block; box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink); margin-right: 2px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); font-size: 12px; font-weight: 600; font-family: var(--font-display); cursor: pointer; border: 1px solid var(--line); background: var(--surface); color: var(--ink); white-space: nowrap; text-decoration: none; }
    .btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
    .btn.sm { padding: 6px 10px; font-size: 11px; }
    .btn.lg { padding: 12px 20px; font-size: 14px; border-radius: 10px; }

    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; font-family: var(--font-display); white-space: nowrap; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); }
    .pill.accent { background: var(--accent-bg); border-color: transparent; color: var(--accent-d); }
    .pill.solid { background: var(--ink); border-color: transparent; color: var(--frame); }

    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 16px; }
    .card.hairline { border-color: var(--line-soft); }

    .page { max-width: 880px; margin: 0 auto; padding: 28px 32px 60px; }
    .t-meta { font-size: 11px; color: var(--ink-3); }
    .t-eyebrow { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }

    .tabs { display: flex; gap: 6px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
    .tab { padding: 10px 14px; font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--ink-3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/seshn-supabase.js"></script>
  <script src="../js/seshn-nav.js"></script>

  <script type="text/babel">
    function statusPillClass(status) {
      if (status === "accepted") return "pill accent";
      if (status === "rejected" || status === "withdrawn") return "pill";
      return "pill solid";
    }
    function statusLabel(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }
    function compLabel(g) {
      if (!g) return "—";
      if (g.comp === "paid" && g.pay_amount) return "Paid · $" + Number(g.pay_amount).toLocaleString();
      if (g.comp === "paid") return "Paid";
      if (g.comp === "split") return "Split";
      if (g.comp === "trade") return "Trade";
      return "Unpaid";
    }

    function ApplicationRow({ app, onChange }) {
      const g = app.gig || {};
      const owner = g.owner || {};
      const [busy, setBusy] = React.useState(false);

      const withdraw = async () => {
        if (!confirm("Withdraw your application?")) return;
        setBusy(true);
        try {
          const updated = await window.seshn.updateApplicationStatus(app.id, "withdrawn");
          onChange(Object.assign({}, app, updated));
        } catch (e) {
          alert((e && e.message) || "Couldn't withdraw.");
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="card" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start" }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <a href={"gig.html?id=" + encodeURIComponent(g.id)} style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 16, color: "var(--ink)", textDecoration: "none" }}>
                {g.title || "(Gig removed)"}
              </a>
              <div className="t-meta" style={{ marginTop: 3 }}>
                {g.role && <span>{g.role}</span>}
                {g.role && " · "}
                <span>{compLabel(g)}</span>
                {g.location && " · " + g.location}
                {owner.display_name && (
                  <>
                    {" · by "}
                    <a href={"profile.html?u=" + encodeURIComponent(owner.username || "")} style={{ color: "var(--ink-2)", textDecoration: "none" }}>
                      {owner.display_name}
                    </a>
                    {owner.is_pro && " ✓"}
                  </>
                )}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              {g.status === "closed" && (
                <span className="pill" style={{ background: "var(--ink)", color: "var(--frame)", borderColor: "transparent" }}>Gig closed</span>
              )}
              <span className={statusPillClass(app.status)}>{statusLabel(app.status)}</span>
            </div>
          </div>
          <p style={{ fontSize: 13, lineHeight: 1.5, color: "var(--ink-2)", whiteSpace: "pre-wrap", display: "-webkit-box", WebkitLineClamp: 3, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{app.pitch}</p>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 10, borderTop: "1px solid var(--line-soft)" }}>
            <span className="t-meta">Applied {new Date(app.created_at).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })}</span>
            <div style={{ display: "flex", gap: 6 }}>
              {app.status === "pending" && (
                <button className="btn sm" onClick={withdraw} disabled={busy}>
                  {busy ? "…" : "Withdraw"}
                </button>
              )}
              {g.id && <a href={"gig.html?id=" + encodeURIComponent(g.id)} className="btn sm">View gig</a>}
            </div>
          </div>
        </div>
      );
    }

    function ApplicationsPage() {
      const [me, setMe] = React.useState(undefined);
      const [apps, setApps] = React.useState(null);
      const [tab, setTab] = React.useState("active");

      React.useEffect(() => {
        (async () => {
          const r = await window.seshn.requireProfile({ allowAnon: true });
          if (!r) return; // redirected
          if (!r.user) { setMe(null); return; }
          setMe(r.user);
          const list = await window.seshn.listMyApplications();
          setApps(list);
        })();
      }, []);

      const updateOne = (next) => {
        setApps(prev => prev.map(a => a.id === next.id ? next : a));
      };

      if (me === undefined) {
        return (
          <div>
            <SeshnAppNav active={null} />
            <div className="page"><div className="t-meta">Loading…</div></div>
          </div>
        );
      }
      if (me === null) {
        return (
          <div>
            <SeshnAppNav active={null} showPostButton={false} />
            <div className="page" style={{ textAlign: "center", paddingTop: 60 }}>
              <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 28 }}>Sign in to see your applications</h1>
              <p style={{ color: "var(--ink-3)", marginTop: 8, marginBottom: 18 }}>Track every gig you've pitched yourself for.</p>
              <a href={"auth.html?next=" + encodeURIComponent("/app/applications.html")} className="btn primary lg">Sign in</a>
            </div>
          </div>
        );
      }

      const list = apps || [];
      const active = list.filter(a => a.status === "pending" || a.status === "accepted");
      const archived = list.filter(a => a.status === "rejected" || a.status === "withdrawn");
      const shown = tab === "active" ? active : archived;

      return (
        <div>
          <SeshnAppNav active={null} />
          <div className="page">
            <div style={{ marginBottom: 18 }}>
              <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 26, letterSpacing: "-0.02em" }}>My applications</h1>
              <span className="t-meta" style={{ fontSize: 12 }}>
                {apps === null ? "Loading…" : list.length + " total · " + active.length + " active · " + archived.length + " archived"}
              </span>
            </div>

            <div className="tabs">
              <span className={"tab" + (tab === "active" ? " active" : "")} onClick={() => setTab("active")}>
                Active {active.length > 0 && <span className="t-meta" style={{ marginLeft: 4 }}>({active.length})</span>}
              </span>
              <span className={"tab" + (tab === "archived" ? " active" : "")} onClick={() => setTab("archived")}>
                Archived {archived.length > 0 && <span className="t-meta" style={{ marginLeft: 4 }}>({archived.length})</span>}
              </span>
            </div>

            {apps === null ? (
              <div className="t-meta">Loading applications…</div>
            ) : shown.length === 0 ? (
              <div className="card" style={{ textAlign: "center", padding: 30 }}>
                <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 20, marginBottom: 6 }}>
                  {tab === "active" ? (list.length === 0 ? "You haven't applied to anything yet." : "No active applications.") : "Nothing archived."}
                </div>
                <div className="t-meta" style={{ marginBottom: 14 }}>
                  {tab === "active" ? "Browse open gigs and send your first pitch." : "Withdrawn or rejected applications will land here."}
                </div>
                {tab === "active" && <a href="feed.html" className="btn primary">Browse gigs</a>}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {shown.map(a => <ApplicationRow key={a.id} app={a} onChange={updateOne} />)}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ApplicationsPage />);
  </script>
</body>
</html>
