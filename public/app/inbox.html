<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seshn — Inbox</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ef; --frame: #ffffff; --surface: #ffffff; --surface-2: #f7f6f3;
      --line: #d8d6d1; --line-soft: #ececea; --ink: #0d0d0d; --ink-2: #3a3a38;
      --ink-3: #6e6c66; --ink-4: #a4a29c; --ph: #ececea; --ph-2: #e2e0db;
      --accent: #2CCB73; --accent-d: #1C8F56; --accent-bg: #A8EBC8;
      --r-sm: 4px; --r: 8px; --r-lg: 14px; --r-pill: 999px;
      --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
    #root { height: 100%; display: flex; flex-direction: column; }

    .logo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 20px; color: var(--ink); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo::before { content: ""; width: 14px; height: 14px; border-radius: 3px; background: var(--accent); display: inline-block; box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink); margin-right: 2px; }

    .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--line); background: var(--frame); flex-shrink: 0; }
    .nav-search { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--surface-2); border-radius: 999px; border: 1px solid var(--line); flex: 1; max-width: 360px; margin-left: 24px; }
    .nav-right { display: flex; align-items: center; gap: 14px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); font-size: 12px; font-weight: 600; font-family: var(--font-display); cursor: pointer; border: 1px solid var(--line); background: var(--surface); color: var(--ink); white-space: nowrap; text-decoration: none; }
    .btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
    .btn.sm { padding: 6px 10px; font-size: 11px; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; font-family: var(--font-display); white-space: nowrap; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); cursor: pointer; }
    .pill.solid { background: var(--ink); border-color: transparent; color: var(--frame); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--ph); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--ink-3); flex-shrink: 0; }
    .avatar.md { width: 40px; height: 40px; font-size: 14px; }

    .main { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }

    /* Conversation list */
    .convo-list { border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
    .convo-header { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
    .convo-header-row { display: flex; align-items: center; justify-content: space-between; }
    .search-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface-2); border-radius: 999px; border: 1px solid var(--line); }
    .filter-row { display: flex; gap: 6px; }
    .convo-scroll { overflow-y: auto; flex: 1; }

    .convo-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-left: 3px solid transparent; cursor: pointer; transition: background 0.1s; }
    .convo-item:hover { background: var(--surface-2); }
    .convo-item.active { background: var(--surface-2); border-left-color: var(--ink); }
    .convo-info { flex: 1; min-width: 0; }
    .convo-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .convo-name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--ink); }
    .convo-time { font-size: 11px; color: var(--ink-4); }
    .convo-preview { font-size: 12px; color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .convo-preview.unread { color: var(--ink-2); font-weight: 500; }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 4px; }

    /* Active DM */
    .dm-panel { display: flex; flex-direction: column; overflow: hidden; }
    .dm-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .dm-header-left { display: flex; align-items: center; gap: 12px; }
    .dm-header-right { display: flex; gap: 14px; align-items: center; }

    .messages { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 0; }
    .date-divider { text-align: center; font-size: 11px; color: var(--ink-4); padding: 10px 0; font-family: var(--font-display); }

    .msg-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; }
    .msg-row.self { flex-direction: row-reverse; }
    .msg-content { display: flex; flex-direction: column; gap: 4px; max-width: 68%; }
    .msg-row.self .msg-content { align-items: flex-end; }
    .msg-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; }
    .msg-name { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--ink); }
    .msg-time { color: var(--ink-4); }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.45; color: var(--ink); background: var(--surface-2); border-top-left-radius: 3px; }
    .msg-row.self .msg-bubble { background: var(--ink); color: var(--frame); border-top-left-radius: 12px; border-top-right-radius: 3px; }

    .audio-embed { border: 1px solid var(--line); border-radius: var(--r); background: var(--surface); padding: 8px 10px; display: flex; align-items: center; gap: 10px; }
    .play-btn { width: 26px; height: 26px; border-radius: 50%; background: var(--ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .play-btn::after { content: ""; width: 0; height: 0; border-left: 7px solid var(--accent); border-top: 4px solid transparent; border-bottom: 4px solid transparent; margin-left: 2px; }
    .ph-line { background: var(--ph); border-radius: 2px; height: 6px; }

    .composer { padding: 12px 24px; border-top: 1px solid var(--line); flex-shrink: 0; }
    .composer-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); }
    .composer-input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; font-family: var(--font-body); color: var(--ink); }
    .composer-input::placeholder { color: var(--ink-4); }

    .t-meta { font-size: 11px; color: var(--ink-3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/seshn-supabase.js"></script>
  <script src="../js/seshn-nav.js"></script>

  <script type="text/babel">
    function initials(name) {
      if (!name) return "··";
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return (parts[0] || "··").slice(0, 2).toUpperCase();
    }
    function formatRelativeTime(iso) {
      if (!iso) return "";
      const t = new Date(iso);
      const now = new Date();
      const sameDay = t.toDateString() === now.toDateString();
      if (sameDay) return t.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
      const diffDays = Math.floor((now - t) / 86400000);
      if (diffDays < 7) return t.toLocaleDateString(undefined, { weekday: "short" });
      return t.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }
    function formatMessageTime(iso) {
      return new Date(iso).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }
    function dateKey(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function ConvoListItem({ convo, isActive, onSelect }) {
      const o = convo.other || {};
      const preview = convo.last_message_preview || (convo.last_message_at ? "" : "Say hi — no messages yet.");
      const sentByMe = convo.last_message_sender === convo.me_id;
      return (
        <div className={`convo-item ${isActive ? "active" : ""}`} onClick={onSelect}>
          <div className="avatar">{initials(o.display_name)}</div>
          <div className="convo-info">
            <div className="convo-name-row">
              <span className="convo-name">{o.display_name || o.username || "User"}</span>
              <span className="convo-time">{formatRelativeTime(convo.last_message_at)}</span>
            </div>
            <span className={`convo-preview ${convo.unread ? "unread" : ""}`}>
              {sentByMe && convo.last_message_preview && <span style={{ color: "var(--ink-4)" }}>You: </span>}
              {preview}
            </span>
          </div>
          {convo.unread && <div className="unread-dot" />}
        </div>
      );
    }

    function MessagesPane({ convo, messages, meId }) {
      const scrollRef = React.useRef(null);
      React.useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages]);

      if (messages === null) return <div className="messages"><div className="t-meta">Loading…</div></div>;
      if (messages.length === 0) {
        const o = convo.other || {};
        return (
          <div className="messages" ref={scrollRef}>
            <div style={{ margin: "auto", textAlign: "center", padding: 40 }}>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 16, marginBottom: 6 }}>
                Start the conversation with {(o.display_name || "this user").split(" ")[0]}
              </div>
              <div className="t-meta">No messages yet — type below to say hi.</div>
            </div>
          </div>
        );
      }

      // Group messages by date for dividers
      const rendered = [];
      let lastDate = null;
      for (const m of messages) {
        const dk = dateKey(m.created_at);
        if (dk !== lastDate) {
          rendered.push(<div key={"d-" + dk} className="date-divider">{dk}</div>);
          lastDate = dk;
        }
        const mine = m.sender_id === meId;
        const senderName = mine ? "You" : ((convo.other && convo.other.display_name) || "User");
        const senderInitials = mine ? initials(senderName) : initials((convo.other && convo.other.display_name) || "");
        rendered.push(
          <div key={m.id} className={`msg-row ${mine ? "self" : ""}`}>
            <div className="avatar" style={mine ? { background: "var(--ink)", color: "var(--frame)" } : {}}>
              {senderInitials}
            </div>
            <div className="msg-content">
              <div className="msg-meta" style={mine ? { flexDirection: "row-reverse" } : {}}>
                <span className="msg-name">{senderName}</span>
                <span className="msg-time">{formatMessageTime(m.created_at)}</span>
              </div>
              <div className="msg-bubble" style={{ whiteSpace: "pre-wrap" }}>{m.body}</div>
            </div>
          </div>
        );
      }
      return <div className="messages" ref={scrollRef}>{rendered}</div>;
    }

    function Composer({ disabled, onSend, placeholderName }) {
      const [draft, setDraft] = React.useState("");
      const [busy, setBusy] = React.useState(false);
      const send = async () => {
        const text = draft.trim();
        if (!text || busy) return;
        setBusy(true);
        try {
          await onSend(text);
          setDraft("");
        } catch (e) {
          alert((e && e.message) || "Couldn't send.");
        } finally {
          setBusy(false);
        }
      };
      const onKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      };
      return (
        <div className="composer">
          <div className="composer-inner">
            <input
              className="composer-input"
              placeholder={"Message " + (placeholderName ? placeholderName.split(" ")[0] : "") + "… (Enter to send)"}
              value={draft}
              onChange={e => setDraft(e.target.value)}
              onKeyDown={onKey}
              disabled={disabled || busy}
              maxLength={4000}
            />
            <button
              className="btn primary sm"
              onClick={send}
              disabled={disabled || busy || !draft.trim()}
              style={{ opacity: (!draft.trim() || busy) ? 0.5 : 1 }}
            >
              {busy ? "…" : "Send"}
            </button>
          </div>
        </div>
      );
    }

    function DmPanel({ convo, meId, onMessageSent }) {
      const [messages, setMessages] = React.useState(null);

      React.useEffect(() => {
        if (!convo) return;
        let cancelled = false;
        setMessages(null);
        window.seshn.listMessages(convo.id).then(list => {
          if (!cancelled) setMessages(list);
        });
        window.seshn.markConversationRead(convo.id);
        const unsub = window.seshn.subscribeToMessages(convo.id, (msg) => {
          setMessages(prev => {
            if (!prev) return [msg];
            if (prev.some(m => m.id === msg.id)) return prev;
            return prev.concat(msg);
          });
          if (msg.sender_id !== meId) window.seshn.markConversationRead(convo.id);
        });
        return () => { cancelled = true; unsub(); };
      }, [convo && convo.id, meId]);

      if (!convo) {
        return (
          <div className="dm-panel" style={{ alignItems: "center", justifyContent: "center" }}>
            <div style={{ margin: "auto", textAlign: "center", padding: 40, maxWidth: 360 }}>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 22, marginBottom: 6, color: "var(--ink)" }}>Your inbox</div>
              <div className="t-meta" style={{ fontSize: 13 }}>Pick a conversation, or find someone in Browse and hit Message to start a new one.</div>
            </div>
          </div>
        );
      }

      const o = convo.other || {};
      const profileHref = "profile.html?u=" + encodeURIComponent(o.username || "");

      const send = async (text) => {
        const msg = await window.seshn.sendMessage(convo.id, text);
        setMessages(prev => prev ? prev.concat(msg) : [msg]);
        onMessageSent && onMessageSent(convo.id, msg);
      };

      return (
        <div className="dm-panel">
          <div className="dm-header">
            <div className="dm-header-left">
              <a href={profileHref} className="avatar md" style={{ textDecoration: "none", color: "var(--ink-3)" }}>
                {initials(o.display_name)}
              </a>
              <div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3 }}>
                  <a href={profileHref} style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 15, color: "var(--ink)", textDecoration: "none" }}>
                    {o.display_name || o.username || "User"}
                  </a>
                  {o.is_pro && <span className="pill solid" style={{ fontSize: 9, padding: "2px 7px" }}>✓ Pro</span>}
                </div>
                <div className="t-meta">
                  {(o.roles && o.roles[0]) || "Artist"}
                  {o.location && " · " + o.location}
                </div>
              </div>
            </div>
            <div className="dm-header-right">
              <a href={profileHref} className="btn sm">View profile</a>
            </div>
          </div>
          <MessagesPane convo={convo} messages={messages} meId={meId} />
          <Composer onSend={send} placeholderName={o.display_name || o.username || ""} />
        </div>
      );
    }

    function InboxPage() {
      const [me, setMe] = React.useState(undefined); // undefined = loading, null = signed out
      const [convos, setConvos] = React.useState(null);
      const [activeId, setActiveId] = React.useState(null);
      const [filter, setFilter] = React.useState("all");
      const [search, setSearch] = React.useState("");

      const selectConvo = React.useCallback((id) => {
        setActiveId(id);
        const url = new URL(window.location.href);
        if (id) url.searchParams.set("c", id); else url.searchParams.delete("c");
        window.history.replaceState({}, "", url.toString());
      }, []);

      // Load user + conversations
      const refresh = React.useCallback(async () => {
        const list = await window.seshn.listMyConversations();
        setConvos(list);
        return list;
      }, []);

      React.useEffect(() => {
        let unsub = function () {};
        (async () => {
          const u = await window.seshn.getUser();
          setMe(u || null);
          if (!u) return;
          const list = await refresh();
          // Resolve initial active conversation from ?c=...
          const initialId = new URLSearchParams(window.location.search).get("c");
          if (initialId && list.some(c => c.id === initialId)) {
            setActiveId(initialId);
          } else if (initialId) {
            // Conversation wasn't in the list — try fetching directly (just created)
            const c = await window.seshn.getConversation(initialId);
            if (c) {
              setConvos(prev => (prev || []).concat([Object.assign({}, c, { unread: false, me_id: u.id })]));
              setActiveId(initialId);
            }
          }
          unsub = await window.seshn.subscribeToMyConversations(() => { refresh(); });
        })();
        return () => unsub();
      }, [refresh]);

      const activeConvo = convos && activeId ? convos.find(c => c.id === activeId) : null;

      // Filter conversations by search + unread filter
      const filtered = React.useMemo(() => {
        if (!convos) return null;
        let arr = convos;
        if (filter === "unread") arr = arr.filter(c => c.unread);
        if (search.trim()) {
          const s = search.trim().toLowerCase();
          arr = arr.filter(c => {
            const o = c.other || {};
            return (o.display_name || "").toLowerCase().includes(s)
              || (o.username || "").toLowerCase().includes(s)
              || (c.last_message_preview || "").toLowerCase().includes(s);
          });
        }
        return arr;
      }, [convos, filter, search]);

      const unreadCount = (convos || []).filter(c => c.unread).length;

      if (me === undefined) {
        return (
          <div id="root-inner" style={{ height: "100%", display: "flex", flexDirection: "column" }}>
            <SeshnAppNav active="inbox" />
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--ink-3)" }}>Loading…</div>
          </div>
        );
      }
      if (me === null) {
        return (
          <div id="root-inner" style={{ height: "100%", display: "flex", flexDirection: "column" }}>
            <SeshnAppNav active="inbox" showPostButton={false} />
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 12, alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
              <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 28, color: "var(--ink)" }}>Sign in to use your inbox</span>
              <span className="t-meta" style={{ fontSize: 14 }}>DMs are private to signed-in members.</span>
              <a href={"auth.html?next=" + encodeURIComponent("/app/inbox.html")} className="btn primary" style={{ marginTop: 6 }}>Sign in</a>
            </div>
          </div>
        );
      }

      return (
        <div id="root-inner" style={{ height: "100%", display: "flex", flexDirection: "column" }}>
          <SeshnAppNav active="inbox" />

          <div className="main">
            <div className="convo-list">
              <div className="convo-header">
                <div className="convo-header-row">
                  <span style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 20 }}>Inbox</span>
                  <span className="t-meta">{unreadCount > 0 ? unreadCount + " unread" : "All caught up"}</span>
                </div>
                <div className="search-bar">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-3)", flexShrink: 0 }}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                  <input
                    type="text"
                    placeholder="Search conversations"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    style={{ flex: 1, border: 0, background: "transparent", outline: "none", fontSize: 12, fontFamily: "var(--font-body)", color: "var(--ink)" }}
                  />
                </div>
                <div className="filter-row">
                  <span className={`pill ${filter === "all" ? "solid" : ""}`} onClick={() => setFilter("all")}>All</span>
                  <span className={`pill ${filter === "unread" ? "solid" : ""}`} onClick={() => setFilter("unread")}>
                    Unread{unreadCount > 0 && " · " + unreadCount}
                  </span>
                </div>
              </div>

              <div className="convo-scroll">
                {filtered === null ? (
                  <div className="t-meta" style={{ padding: 18 }}>Loading…</div>
                ) : filtered.length === 0 ? (
                  <div style={{ padding: 24, textAlign: "center" }}>
                    <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 14, marginBottom: 6 }}>
                      {convos.length === 0 ? "No conversations yet" : "Nothing here"}
                    </div>
                    <div className="t-meta" style={{ marginBottom: 12, fontSize: 12 }}>
                      {convos.length === 0
                        ? "Find someone in Browse and hit Message to say hi."
                        : (filter !== "all" ? "Try clearing the filter." : "Try a different search.")}
                    </div>
                    {convos.length === 0 && <a href="browse.html" className="btn sm">Find artists</a>}
                  </div>
                ) : (
                  filtered.map(c => (
                    <ConvoListItem
                      key={c.id}
                      convo={c}
                      isActive={c.id === activeId}
                      onSelect={() => selectConvo(c.id)}
                    />
                  ))
                )}
              </div>
            </div>

            <DmPanel
              convo={activeConvo}
              meId={me.id}
              onMessageSent={() => refresh()}
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<InboxPage />);
  </script>
</body>
</html>
