<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seshn — Gig: Topline Writer for Afrobeats Demo</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ef; --frame: #ffffff; --surface: #ffffff; --surface-2: #f7f6f3;
      --line: #d8d6d1; --line-soft: #ececea; --ink: #0d0d0d; --ink-2: #3a3a38;
      --ink-3: #6e6c66; --ink-4: #a4a29c; --ph: #ececea; --ph-2: #e2e0db;
      --accent: #2CCB73; --accent-d: #1C8F56; --accent-m: #63D89A; --accent-bg: #A8EBC8;
      --r-sm: 4px; --r: 8px; --r-lg: 14px; --r-pill: 999px;
      --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
    }
    html, body { background: var(--bg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

    .logo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 20px; color: var(--ink); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo::before { content: ""; width: 14px; height: 14px; border-radius: 3px; background: var(--accent); display: inline-block; box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink); margin-right: 2px; }

    .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--line); background: var(--frame); position: sticky; top: 0; z-index: 10; }
    .nav-search { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--surface-2); border-radius: 999px; border: 1px solid var(--line); flex: 1; max-width: 360px; margin-left: 24px; }
    .nav-right { display: flex; align-items: center; gap: 14px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); font-size: 12px; font-weight: 600; font-family: var(--font-display); cursor: pointer; border: 1px solid var(--line); background: var(--surface); color: var(--ink); white-space: nowrap; text-decoration: none; }
    .btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
    .btn.dark { background: var(--ink); color: var(--frame); border-color: transparent; }
    .btn.sm { padding: 6px 10px; font-size: 11px; }
    .btn.lg { padding: 12px 20px; font-size: 14px; border-radius: 10px; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; font-family: var(--font-display); white-space: nowrap; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); }
    .pill.accent { background: var(--accent-bg); border-color: transparent; color: var(--accent-d); }
    .pill.solid { background: var(--ink); border-color: transparent; color: var(--frame); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--ph); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--ink-3); flex-shrink: 0; }
    .avatar.lg { width: 56px; height: 56px; font-size: 18px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 16px; }
    .card.hairline { border-color: var(--line-soft); }

    .page { max-width: 1200px; margin: 0 auto; padding: 28px 56px 60px; display: grid; grid-template-columns: 1fr 340px; gap: 32px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-3); text-decoration: none; margin-bottom: 20px; font-family: var(--font-display); }
    .back-link:hover { color: var(--ink); }
    .t-meta { font-size: 11px; color: var(--ink-3); }
    .t-eyebrow { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }

    .cover-header { height: 170px; position: relative; overflow: hidden; border-radius: var(--r-lg); border: 1px solid var(--line); margin-bottom: 20px; }

    .audio-embed { border: 1px solid var(--line); border-radius: var(--r); background: var(--surface); padding: 10px 12px; display: flex; align-items: center; gap: 12px; }
    .play-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
    .play-btn::after { content: ""; width: 0; height: 0; border-left: 9px solid var(--accent); border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 3px; }

    .apply-section { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 20px; }
    textarea.input-field { width: 100%; padding: 10px 12px; border-radius: var(--r); border: 1px solid var(--line); background: var(--surface); font-size: 13px; font-family: var(--font-body); color: var(--ink); outline: none; resize: none; }
    textarea.input-field:focus { border-color: var(--ink); }
    textarea.input-field::placeholder { color: var(--ink-4); }

    .attach-box { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 1.5px dashed var(--line); border-radius: var(--r); cursor: pointer; color: var(--ink-3); font-size: 12px; }
    .attach-box:hover { border-color: var(--ink-3); }

    .ph-line { background: var(--ph); border-radius: 2px; height: 8px; }

    .mini-gig { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; padding: 20px 20px 40px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/seshn-supabase.js"></script>

  <script type="text/babel">
    const V_PAL = { plum:"#5b3858", cream:"#f0e8d6", rust:"#d96e3f", forest:"#2a4d3a", mint:"#a8ebc8", ink:"#0d0d0d", navy:"#1f3a5f", bone:"#f4f1e9", lime:"#c4e83a", cherry:"#c43d3f", green:"#2CCB73", butter:"#f6d36b" };
    const COVER_PALETTES = [[V_PAL.plum,V_PAL.cream,V_PAL.rust],[V_PAL.cream,V_PAL.ink,V_PAL.rust],[V_PAL.forest,V_PAL.mint,V_PAL.butter],[V_PAL.navy,V_PAL.bone,V_PAL.butter],[V_PAL.ink,V_PAL.lime,V_PAL.mint],[V_PAL.cherry,V_PAL.cream,V_PAL.ink],[V_PAL.bone,V_PAL.plum,V_PAL.rust],[V_PAL.rust,V_PAL.cream,V_PAL.ink],[V_PAL.green,V_PAL.ink,V_PAL.bone],[V_PAL.mint,V_PAL.forest,V_PAL.ink]];
    function _hash(s){let h=2166136261>>>0;s=String(s||"x");for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
    function _rng(seed){let s=seed>>>0;return()=>{s=(s+0x6D2B79F5)>>>0;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}

    const AlbumArt=({seed="track",size=56,variant,radius=6,style})=>{const h=_hash(seed);const v=variant!=null?variant:h%8;const pal=COVER_PALETTES[((h>>>3)%COVER_PALETTES.length)];const bg=pal[0],fg=pal[1],ac=pal[2];const rng=_rng(h);const wrap={width:size,height:size,borderRadius:radius,overflow:"hidden",flex:"0 0 auto",display:"inline-block",...style};let inner;if(v===0){const cx=50,cy=38+(rng()-0.5)*16;inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><circle cx={cx} cy={cy} r={26} fill={ac}/><rect x="0" y="68" width="100" height="6" fill={fg}/></svg>;}else if(v===1){const dots=[];for(let y=0;y<10;y++)for(let x=0;x<10;x++){const d=(x+y)/18;const r=Math.max(0.4,4.2*(1-d)+rng()*0.4);dots.push(<circle key={x+"_"+y} cx={5+x*10} cy={5+y*10} r={r} fill={fg}/>);}inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{dots}</svg>;}else if(v===2){const letter=(seed[0]||"S").toUpperCase();inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><text x="50" y="72" textAnchor="middle" fontFamily="var(--font-display)" fontWeight="700" fontSize="86" fill={fg}>{letter}</text><rect x="14" y="84" width="72" height="4" fill={ac}/></svg>;}else if(v===3){const bars=[];for(let i=0;i<28;i++){const t=i/27;const env=Math.sin(t*Math.PI)**0.6;const a=10+rng()*80*env;bars.push(<rect key={i} x={5+i*3.4} y={50-a/2} width="2" height={a} fill={fg} rx="1"/>);}inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{bars}</svg>;}else if(v===4){inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><polygon points="0,0 100,0 0,100" fill={fg}/><circle cx="50" cy="50" r="18" fill={ac}/></svg>;}else if(v===5){inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{[36,26,16].map((r,i)=><circle key={i} cx="50" cy="50" r={r} fill="none" stroke={fg} strokeWidth={i===1?2:1.2} opacity={0.85-i*0.1}/>)}<circle cx={50+36*Math.cos(((h>>>5)%360)*Math.PI/180)} cy={50+36*Math.sin(((h>>>5)%360)*Math.PI/180)} r="5" fill={ac}/></svg>;}else if(v===6){inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><rect x="18" y="22" width="58" height="58" fill={ac}/><rect x="26" y="30" width="58" height="58" fill={fg} opacity="0.85"/><rect x="34" y="38" width="58" height="58" fill={ac} opacity="0.6"/></svg>;}else{inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><rect y="55" width="100" height="45" fill={fg}/><circle cx="50" cy="55" r="20" fill={ac}/></svg>;}return <div style={wrap} aria-hidden="true">{inner}</div>;};

    function _getHeaderPal(seed) {
      const h = _hash(seed);
      return COVER_PALETTES[h % COVER_PALETTES.length];
    }

    const CoverHeader = ({ height = 160, seed = "cover" }) => {
      const h = _hash(seed);
      const pal = COVER_PALETTES[h % COVER_PALETTES.length];
      const [bg, fg, ac] = pal;
      return (
        <div style={{ height, position: "relative", overflow: "hidden", background: bg, borderRadius: "var(--r-lg)", border: "1px solid var(--line)" }}>
          <svg viewBox="0 0 400 160" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style={{ position: "absolute", inset: 0 }}>
            <circle cx="80" cy="80" r="80" fill={ac} />
            <circle cx="320" cy="100" r="56" fill={fg} opacity="0.8" />
            <rect x="0" y="130" width="400" height="6" fill={fg} />
            {Array.from({ length: 14 }).map((_, i) => (
              <circle key={i} cx={200 + i * 13} cy={50} r={5 - i * 0.28} fill={fg} opacity={0.6 - i * 0.04} />
            ))}
          </svg>
        </div>
      );
    };

    function Waveform({ seed = "wf", height = 28, bars = 48, progress = 0.32 }) {
      const h = _hash(seed); const rng = _rng(h); const arr = [];
      for (let i = 0; i < bars; i++) { const t = i / (bars - 1); const env = 0.35 + 0.65 * (Math.sin(t * Math.PI) ** 0.6); arr.push((0.18 + 0.82 * rng()) * env); }
      const W = bars * 3; const bw = W / bars - 1.2;
      return (
        <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" width="100%" height={height} style={{ display: "block" }}>
          {arr.map((a, i) => { const x = i * (W / bars); const bh = Math.max(2, a * height); const y = (height - bh) / 2; const isPlayed = (i / bars) < progress; return <rect key={i} x={x} y={y} width={bw} height={bh} fill={isPlayed ? "var(--ink)" : "rgba(0,0,0,0.18)"} rx={bw / 2} />; })}
        </svg>
      );
    }

    // ——— helpers ———
    function gigInitials(name) {
      if (!name) return "··";
      return name.trim().split(/\s+/).map(s => s[0]).join("").slice(0, 2).toUpperCase();
    }
    function gigCompLabel(g) {
      if (g.comp === "paid" && g.pay_amount) return "Paid · $" + Number(g.pay_amount).toLocaleString();
      if (g.comp === "paid") return "Paid";
      if (g.comp === "split") return "Split";
      if (g.comp === "trade") return "Trade";
      return "Unpaid";
    }
    function gigDeadlineLabel(date) {
      if (!date) return null;
      return "Deadline · " + new Date(date).toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }

    function GigPage({ gig }) {
      const owner = gig.owner || {};
      const isBoosted = gig.boosted_until && new Date(gig.boosted_until) > new Date();
      const body = (gig.description || "").split(/\n\n+/).filter(Boolean);

      return (
        <div style={{ background: "var(--bg)", minHeight: "100vh" }}>
          {/* Nav */}
          <nav className="top-nav">
            <div style={{ display: "flex", alignItems: "center" }}>
              <a href="../../index.html" className="logo">Seshn</a>
              <div className="nav-search">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-3)" }}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                <span style={{ fontSize: 12, color: "var(--ink-4)" }}>Search artists, roles, genres…</span>
              </div>
            </div>
            <div className="nav-right">
              <a href="post.html" className="btn primary sm">+ Post a gig</a>
              <a href="inbox.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-2)", display: "block" }}><path d="M21 12a8 8 0 0 1-12 7l-5 1 1-5a8 8 0 1 1 16-3z"/></svg></a>
              <div className="avatar">YT</div>
            </div>
          </nav>

          {/* Main */}
          <div className="page">
            {/* Left */}
            <div>
              <a href="feed.html" className="back-link">← Back to feed</a>

              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
                {isBoosted && <span className="pill solid">★ Boosted</span>}
                <span className="pill accent">{gig.role} needed</span>
                <span className="pill">{gigCompLabel(gig)}</span>
                {gig.location && <span className="pill">{gig.location}</span>}
                {gig.deadline && <span className="pill">{gigDeadlineLabel(gig.deadline)}</span>}
              </div>

              <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 40, lineHeight: 1.02, letterSpacing: "-0.025em", color: "var(--ink)", marginBottom: 20 }}>
                {gig.title}
              </h1>

              {/* Cover art header */}
              <div style={{ position: "relative", marginBottom: 20 }}>
                <CoverHeader seed={gig.id || gig.title} height={160} />
                <div style={{ position: "absolute", left: 18, bottom: 14, display: "flex", gap: 12, alignItems: "center" }}>
                  <AlbumArt seed={gig.title} size={64} radius={6} />
                </div>
                {gig.genres && gig.genres.length > 0 && (
                  <div style={{ position: "absolute", top: 14, right: 14 }}>
                    <span style={{ display: "inline-block", transform: "rotate(4deg)", padding: "5px 10px", borderRadius: 4, background: "var(--ink)", color: "var(--frame)", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 11, letterSpacing: "0.04em", textTransform: "uppercase", boxShadow: "0 4px 12px rgba(0,0,0,0.3)" }}>{gig.genres.slice(0, 2).join(" · ")}</span>
                  </div>
                )}
              </div>

              {/* Poster */}
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <a href={"profile.html?u=" + encodeURIComponent(owner.username || "")} className="avatar" style={{ width: 40, height: 40, fontSize: 14, position: "relative", textDecoration: "none", color: "var(--ink-3)" }}>
                  {gigInitials(owner.display_name)}
                  {owner.is_pro && <span style={{ position: "absolute", bottom: -2, right: -2, background: "var(--frame)", borderRadius: 999, padding: "2px 5px", fontSize: 8, fontFamily: "var(--font-display)", fontWeight: 600, color: "var(--ink)", border: "1px solid var(--line)", lineHeight: 1, textTransform: "uppercase" }}>PRO</span>}
                </a>
                <div>
                  <a href={"profile.html?u=" + encodeURIComponent(owner.username || "")} style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 14, color: "var(--ink)", textDecoration: "none" }}>{owner.display_name || "Artist"}</a>
                  <div className="t-meta">{(owner.roles && owner.roles[0]) || "Artist"}{owner.location ? " · " + owner.location : ""} · Posted {gig.created_at ? new Date(gig.created_at).toLocaleDateString() : "recently"}</div>
                </div>
              </div>

              {/* Body */}
              {body.length > 0 ? (
                <div style={{ borderTop: "1px solid var(--line)", paddingTop: 20, marginBottom: 24 }}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    {body.map((p, i) => (
                      <p key={i} style={{ fontSize: 14, lineHeight: 1.65, color: "var(--ink-2)", whiteSpace: "pre-wrap" }}>{p}</p>
                    ))}
                  </div>
                </div>
              ) : (
                <div style={{ borderTop: "1px solid var(--line)", paddingTop: 20, marginBottom: 24 }}>
                  <p style={{ fontSize: 14, color: "var(--ink-3)", fontStyle: "italic" }}>No additional brief — reach out to {owner.display_name || "the poster"} for details.</p>
                </div>
              )}

              {/* Genres */}
              {gig.genres && gig.genres.length > 0 && (
                <div style={{ marginBottom: 24 }}>
                  <div className="t-eyebrow" style={{ marginBottom: 10 }}>Genres</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {gig.genres.map(g => <span key={g} className="pill">{g}</span>)}
                  </div>
                </div>
              )}

              {/* Apply */}
              <div className="apply-section" style={{ marginBottom: 28 }}>
                <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 18, marginBottom: 6 }}>Apply</div>
                <div className="t-meta" style={{ marginBottom: 16 }}>{(owner.display_name || "The poster").split(" ")[0]} sees your pitch + 1 attached track.</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <textarea className="input-field" rows={5} placeholder="Short pitch — what you'd bring, references, turnaround time…" />
                  <div style={{ display: "flex", gap: 10 }}>
                    <div className="attach-box" style={{ flex: 1 }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21 12-8.5 8.5a5 5 0 1 1-7-7L14 5a3 3 0 1 1 4 4l-9 9a1 1 0 1 1-1.5-1.5L15 8"/></svg>
                      Attach a portfolio track →
                    </div>
                    <button className="btn primary lg" onClick={() => alert("Applications are coming in the next slice — for now, message " + (owner.display_name || "the poster") + " directly.")}>Send application</button>
                  </div>
                </div>
              </div>
            </div>

            {/* Right sidebar */}
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {/* Poster card */}
              <div className="card">
                <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                  <a href={"profile.html?u=" + encodeURIComponent(owner.username || "")} className="avatar lg" style={{ textDecoration: "none", color: "var(--ink-3)" }}>{gigInitials(owner.display_name)}</a>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3 }}>
                      <a href={"profile.html?u=" + encodeURIComponent(owner.username || "")} style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 15, color: "var(--ink)", textDecoration: "none" }}>{owner.display_name || "Artist"}</a>
                      {owner.is_pro && <span className="pill solid" style={{ fontSize: 9, padding: "2px 7px" }}>✓ Pro</span>}
                    </div>
                    <div className="t-meta">{(owner.roles && owner.roles.join(" · ")) || "Artist"}{owner.location ? " · " + owner.location : ""}</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: 12, borderTop: "1px solid var(--line-soft)" }}>
                  <div>
                    <div className="t-meta">Posted</div>
                    <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 15, marginTop: 2 }}>{gig.created_at ? new Date(gig.created_at).toLocaleDateString() : "—"}</div>
                  </div>
                  <a href={"profile.html?u=" + encodeURIComponent(owner.username || "")} className="btn sm">View profile</a>
                </div>
              </div>

              {/* Stats */}
              <div className="card hairline">
                <div className="t-eyebrow" style={{ marginBottom: 12 }}>Gig details</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span className="t-meta">Role</span>
                    <strong style={{ fontFamily: "var(--font-display)", fontSize: 13 }}>{gig.role}</strong>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span className="t-meta">Pay</span>
                    <strong style={{ fontFamily: "var(--font-display)", fontSize: 13 }}>{gigCompLabel(gig)}</strong>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span className="t-meta">Location</span>
                    <strong style={{ fontFamily: "var(--font-display)", fontSize: 13 }}>{gig.location || "—"}</strong>
                  </div>
                  {gig.deadline && (
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span className="t-meta">Closes</span>
                      <strong style={{ fontFamily: "var(--font-display)", fontSize: 13 }}>{new Date(gig.deadline).toLocaleDateString(undefined, { month: "short", day: "numeric" })}</strong>
                    </div>
                  )}
                </div>
              </div>

              {/* Apply CTA repeated */}
              <button className="btn primary" style={{ padding: "14px 20px", fontSize: 14, borderRadius: 10 }}>Apply to this gig →</button>

              <div style={{ textAlign: "center", fontSize: 11, color: "var(--ink-4)" }}>
                Free to apply · no account required to browse
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GigLoader() {
      const [state, setState] = React.useState({ status: "loading", gig: null });
      React.useEffect(() => {
        const id = new URLSearchParams(window.location.search).get("id");
        if (!id) { setState({ status: "notfound", gig: null }); return; }
        if (!window.seshn) { setState({ status: "error", gig: null }); return; }
        window.seshn.getGig(id).then(gig => {
          if (!gig) { setState({ status: "notfound", gig: null }); return; }
          document.title = "Seshn — " + gig.title;
          setState({ status: "ready", gig });
        });
      }, []);

      if (state.status === "loading") {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--ink-3)", fontFamily: "var(--font-display)", fontSize: 13 }}>Loading gig…</div>;
      }
      if (state.status === "notfound") {
        return (
          <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, padding: 24, textAlign: "center" }}>
            <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 28, color: "var(--ink)" }}>Gig not found</span>
            <span style={{ color: "var(--ink-3)", fontSize: 14 }}>This gig may have been closed or removed.</span>
            <a href="feed.html" className="btn primary" style={{ marginTop: 8 }}>← Back to the feed</a>
          </div>
        );
      }
      if (state.status === "error") {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--danger)", fontFamily: "var(--font-display)", fontSize: 13 }}>Couldn't load Seshn. Refresh to try again.</div>;
      }
      return <GigPage gig={state.gig} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GigLoader />);
  </script>
</body>
</html>
