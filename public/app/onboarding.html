<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seshn — Welcome</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ef; --frame: #ffffff; --surface: #ffffff; --surface-2: #f7f6f3;
      --line: #d8d6d1; --line-soft: #ececea; --ink: #0d0d0d; --ink-2: #3a3a38;
      --ink-3: #6e6c66; --ink-4: #a4a29c; --ph: #ececea;
      --accent: #2CCB73; --accent-d: #1C8F56; --accent-bg: #A8EBC8;
      --r-sm: 4px; --r: 8px; --r-lg: 14px; --r-pill: 999px;
      --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
    }
    html, body { height: 100%; background: var(--bg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

    .logo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 20px; color: var(--ink); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo::before { content: ""; width: 14px; height: 14px; border-radius: 3px; background: var(--accent); display: inline-block; box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink); margin-right: 2px; }

    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: var(--bg); }

    .top-bar { width: 100%; max-width: 760px; display: flex; align-items: center; justify-content: space-between; padding: 28px 24px 0; }
    .step-label { font-size: 12px; color: var(--ink-3); font-family: var(--font-display); }

    .progress-bar { display: flex; gap: 6px; width: 100%; max-width: 760px; padding: 20px 24px 0; }
    .progress-seg { flex: 1; height: 3px; border-radius: 2px; }

    .content { width: 100%; max-width: 760px; padding: 28px 24px 0; }
    .eyebrow { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
    h1 { font-family: var(--font-display); font-weight: 600; font-size: 34px; line-height: 1.05; letter-spacing: -0.025em; color: var(--ink); margin-bottom: 10px; }
    .sub { font-size: 14px; color: var(--ink-3); line-height: 1.55; max-width: 500px; margin-bottom: 28px; }

    .roles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 760px; padding: 0 24px; }
    .role-card { padding: 16px 14px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); text-align: center; cursor: pointer; transition: all 0.15s; }
    .role-card:hover { border-color: var(--ink-3); }
    .role-card.selected { border-color: var(--accent-d); background: var(--accent-bg); }
    .role-card span { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--ink); }
    .role-card.selected span { color: var(--accent-d); }
    .role-card .check { color: var(--accent-d); margin-right: 4px; }

    .actions { width: 100%; max-width: 760px; padding: 28px 24px 40px; display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .btn-ghost { background: transparent; border: none; font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--ink-3); cursor: pointer; padding: 10px 14px; border-radius: var(--r); }
    .btn-ghost:hover { color: var(--ink); background: var(--surface-2); }
    .btn-primary { display: flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: var(--r); border: none; background: var(--accent); font-size: 14px; font-family: var(--font-display); font-weight: 600; color: #062c19; cursor: pointer; }
    .btn-primary:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel">
    const ROLES = [
      ["Producer", true], ["Vocalist", true], ["Songwriter", false], ["Rapper", false],
      ["Mixing eng.", false], ["Mastering", false], ["Guitarist", true], ["Drummer", false],
      ["Bassist", false], ["Keys", false], ["DJ", false], ["A&R", false],
    ];

    function OnboardingPage() {
      const [selected, setSelected] = React.useState(
        new Set(ROLES.filter(([,s]) => s).map(([r]) => r))
      );

      const toggle = (role) => {
        setSelected(prev => {
          const next = new Set(prev);
          if (next.has(role)) { next.delete(role); }
          else if (next.size < 3) { next.add(role); }
          return next;
        });
      };

      return (
        <div className="page">
          <div className="top-bar">
            <a href="../../index.html" className="logo">Seshn</a>
            <span className="step-label">Step 1 of 3 · You can change this later</span>
          </div>

          <div className="progress-bar">
            <div className="progress-seg" style={{ background: "var(--accent)" }} />
            <div className="progress-seg" style={{ background: "var(--line)" }} />
            <div className="progress-seg" style={{ background: "var(--line)" }} />
          </div>

          <div className="content">
            <div className="eyebrow">01 · Pick your roles</div>
            <h1>What do you bring<br />to the room?</h1>
            <p className="sub">
              Pick up to 3. Your roles appear on your profile and tune the gigs you see in the feed.
            </p>
          </div>

          <div className="roles-grid">
            {ROLES.map(([role]) => {
              const sel = selected.has(role);
              return (
                <div key={role} className={`role-card ${sel ? "selected" : ""}`} onClick={() => toggle(role)}>
                  <span>{sel && <span className="check">✓</span>}{role}</span>
                </div>
              );
            })}
          </div>

          {selected.size >= 3 && (
            <div style={{ width: "100%", maxWidth: 760, padding: "14px 24px 0", color: "var(--ink-3)", fontSize: 12, fontFamily: "var(--font-display)" }}>
              3 roles selected — deselect one to add another
            </div>
          )}

          <div className="actions">
            <button className="btn-ghost">Skip for now</button>
            <a href="onboarding-genres.html" style={{ textDecoration: "none" }}>
              <button className="btn-primary">Continue → Genres</button>
            </a>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<OnboardingPage />);
  </script>
</body>
</html>
