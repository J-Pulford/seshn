<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seshn — Sundowner EP</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ef; --frame: #ffffff; --surface: #ffffff; --surface-2: #f7f6f3;
      --line: #d8d6d1; --line-soft: #ececea; --ink: #0d0d0d; --ink-2: #3a3a38;
      --ink-3: #6e6c66; --ink-4: #a4a29c; --ph: #ececea;
      --accent: #2CCB73; --accent-d: #1C8F56; --accent-bg: #A8EBC8;
      --r-sm: 4px; --r: 8px; --r-lg: 14px; --r-pill: 999px;
      --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
    #root { height: 100%; display: flex; flex-direction: column; }

    .logo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 20px; color: var(--ink); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo::before { content: ""; width: 14px; height: 14px; border-radius: 3px; background: var(--accent); display: inline-block; box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink); margin-right: 2px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); font-size: 12px; font-weight: 600; font-family: var(--font-display); cursor: pointer; border: 1px solid var(--line); background: var(--surface); color: var(--ink); white-space: nowrap; text-decoration: none; }
    .btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
    .btn.sm { padding: 6px 10px; font-size: 11px; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; font-family: var(--font-display); white-space: nowrap; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); }
    .pill.accent { background: var(--accent-bg); border-color: transparent; color: var(--accent-d); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--ph); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--ink-3); flex-shrink: 0; }
    .avatar.sm { width: 22px; height: 22px; font-size: 9px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 14px; }
    .t-eyebrow { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
    .t-meta { font-size: 11px; color: var(--ink-3); }
    .ph-line { background: var(--ph); border-radius: 2px; height: 7px; }

    /* Project header */
    .project-header { padding: 14px 28px; border-bottom: 1px solid var(--line); background: var(--frame); flex-shrink: 0; }

    /* Layout */
    .main { display: grid; grid-template-columns: 1fr 284px; flex: 1; overflow: hidden; }

    /* Chat */
    .chat-panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--line); }
    .messages { flex: 1; overflow-y: auto; padding: 12px 28px; }
    .date-div { text-align: center; font-size: 11px; color: var(--ink-4); padding: 10px 0 14px; font-family: var(--font-display); }

    .msg-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
    .msg-row.self { flex-direction: row-reverse; }
    .msg-content { display: flex; flex-direction: column; gap: 4px; max-width: 72%; }
    .msg-row.self .msg-content { align-items: flex-end; }
    .msg-meta-row { display: flex; gap: 8px; align-items: center; font-size: 11px; }
    .msg-row.self .msg-meta-row { flex-direction: row-reverse; }
    .msg-name { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--ink); }
    .msg-time { color: var(--ink-4); }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.45; color: var(--ink); background: var(--surface-2); border-top-left-radius: 3px; }
    .msg-row.self .msg-bubble { background: var(--ink); color: var(--frame); border-top-left-radius: 12px; border-top-right-radius: 3px; }

    .audio-embed { border: 1px solid var(--line); border-radius: var(--r); background: var(--surface); padding: 8px 10px; display: flex; align-items: center; gap: 10px; max-width: 340px; }
    .play-btn { width: 26px; height: 26px; border-radius: 50%; background: var(--ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
    .play-btn::after { content: ""; width: 0; height: 0; border-left: 7px solid var(--accent); border-top: 4px solid transparent; border-bottom: 4px solid transparent; margin-left: 2px; }

    .file-embed { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); max-width: 300px; }

    .composer { padding: 12px 28px; border-top: 1px solid var(--line); flex-shrink: 0; background: var(--frame); }
    .composer-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); }
    .composer-input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; font-family: var(--font-body); color: var(--ink); }
    .composer-input::placeholder { color: var(--ink-4); }

    /* Right panel */
    .right-panel { padding: 18px; overflow-y: auto; background: var(--surface-2); display: flex; flex-direction: column; gap: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel">
    const V_PAL = { plum:"#5b3858", cream:"#f0e8d6", rust:"#d96e3f", forest:"#2a4d3a", mint:"#a8ebc8", ink:"#0d0d0d", navy:"#1f3a5f", bone:"#f4f1e9", lime:"#c4e83a", cherry:"#c43d3f", green:"#2CCB73", butter:"#f6d36b" };
    const COVER_PALETTES = [[V_PAL.plum,V_PAL.cream,V_PAL.rust],[V_PAL.cream,V_PAL.ink,V_PAL.rust],[V_PAL.forest,V_PAL.mint,V_PAL.butter],[V_PAL.navy,V_PAL.bone,V_PAL.butter],[V_PAL.ink,V_PAL.lime,V_PAL.mint],[V_PAL.cherry,V_PAL.cream,V_PAL.ink],[V_PAL.bone,V_PAL.plum,V_PAL.rust],[V_PAL.rust,V_PAL.cream,V_PAL.ink],[V_PAL.green,V_PAL.ink,V_PAL.bone],[V_PAL.mint,V_PAL.forest,V_PAL.ink]];
    function _hash(s){let h=2166136261>>>0;s=String(s||"x");for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
    function _rng(seed){let s=seed>>>0;return()=>{s=(s+0x6D2B79F5)>>>0;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}
    const AlbumArt=({seed="track",size=56,radius=6,style})=>{const h=_hash(seed);const v=h%8;const pal=COVER_PALETTES[((h>>>3)%COVER_PALETTES.length)];const bg=pal[0],fg=pal[1],ac=pal[2];const rng=_rng(h);const wrap={width:size,height:size,borderRadius:radius,overflow:"hidden",flex:"0 0 auto",display:"inline-block",...style};let inner;if(v===0){const cy=38+(rng()-0.5)*16;inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><circle cx={50} cy={cy} r={26} fill={ac}/><rect x="0" y="68" width="100" height="6" fill={fg}/></svg>;}else if(v===1){const dots=[];for(let y=0;y<10;y++)for(let x=0;x<10;x++){const d=(x+y)/18;const r=Math.max(0.4,4.2*(1-d)+rng()*0.4);dots.push(<circle key={x+"_"+y} cx={5+x*10} cy={5+y*10} r={r} fill={fg}/>);}inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{dots}</svg>;}else if(v===3){const bars=[];for(let i=0;i<28;i++){const t=i/27;const env=Math.sin(t*Math.PI)**0.6;const a=10+rng()*80*env;bars.push(<rect key={i} x={5+i*3.4} y={50-a/2} width="2" height={a} fill={fg} rx="1"/>);}inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{bars}</svg>;}else if(v===5){inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{[36,26,16].map((r,i)=><circle key={i} cx="50" cy="50" r={r} fill="none" stroke={fg} strokeWidth={i===1?2:1.2} opacity={0.85-i*0.1}/>)}<circle cx={50+36*Math.cos(((h>>>5)%360)*Math.PI/180)} cy={50+36*Math.sin(((h>>>5)%360)*Math.PI/180)} r="5" fill={ac}/></svg>;}else if(v===4){inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><polygon points="0,0 100,0 0,100" fill={fg}/><circle cx="50" cy="50" r="18" fill={ac}/></svg>;}else if(v===6){inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><rect x="18" y="22" width="58" height="58" fill={ac}/><rect x="26" y="30" width="58" height="58" fill={fg} opacity="0.85"/><rect x="34" y="38" width="58" height="58" fill={ac} opacity="0.6"/></svg>;}else{inner=<svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><rect y="55" width="100" height="45" fill={fg}/><circle cx="50" cy="55" r="20" fill={ac}/></svg>;}return <div style={wrap} aria-hidden="true">{inner}</div>;};

    function Waveform({ seed="wf", height=18, bars=40, progress=0.3 }) {
      const h=_hash(seed); const rng=_rng(h); const arr=[];
      for(let i=0;i<bars;i++){const t=i/(bars-1);const env=0.35+0.65*(Math.sin(t*Math.PI)**0.6);arr.push((0.18+0.82*rng())*env);}
      const W=bars*2.8; const bw=W/bars-1;
      return <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" width="100%" height={height} style={{display:"block"}}>{arr.map((a,i)=>{const x=i*(W/bars);const bh=Math.max(1.5,a*height);const y=(height-bh)/2;return <rect key={i} x={x} y={y} width={bw} height={bh} fill={(i/bars)<progress?"var(--ink)":"rgba(0,0,0,0.18)"} rx={bw/2}/>;})}</svg>;
    }

    const MEMBERS = [
      ["Maya Oduya", "MO", "Producer · Owner"],
      ["Nia Kassim", "NK", "Vocalist"],
      ["Theo Brooks", "TB", "Drummer"],
      ["Sam Park", "SP", "Mix engineer"],
      ["Iván Reyes", "IR", "Guitar"],
      ["You", "YT", "A&R"],
    ];

    function ChatMessage({ self, ini, name, time, body, audio, file }) {
      return (
        <div className={`msg-row ${self ? "self" : ""}`}>
          <div className="avatar sm" style={self ? { background: "var(--ink)", color: "var(--frame)" } : {}}>{ini}</div>
          <div className="msg-content">
            <div className="msg-meta-row">
              <span className="msg-name">{name}</span>
              <span className="msg-time">{time}</span>
            </div>
            {body && <div className="msg-bubble">{body}</div>}
            {audio && (
              <div className="audio-embed">
                <AlbumArt seed={audio.title} size={36} radius={4} />
                <div className="play-btn" />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                    <span style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 11.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{audio.title}</span>
                    <span className="t-meta" style={{ marginLeft: 8, flexShrink: 0 }}>Audio</span>
                  </div>
                  <Waveform seed={audio.title} height={16} progress={0} />
                  <div className="t-meta" style={{ marginTop: 3 }}>{audio.meta}</div>
                </div>
              </div>
            )}
            {file && (
              <div className="file-embed">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-3)", flexShrink: 0 }}><path d="M3 6h7l2 2h9v11H3z"/></svg>
                <div>
                  <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 12 }}>{file.name}</div>
                  <div className="t-meta">{file.size}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ProjectPage() {
      return (
        <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "var(--frame)" }}>
          {/* Project header */}
          <div className="project-header">
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <AlbumArt seed="sundowner-ep" size={56} radius={8} />
                <div>
                  <div className="t-eyebrow" style={{ marginBottom: 4 }}>Project · started Apr 12</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 22, letterSpacing: "-0.02em" }}>Sundowner EP</span>
                    <span className="pill accent">In progress</span>
                    <span style={{ display: "inline-block", transform: "rotate(-3deg)", padding: "4px 10px", borderRadius: 4, background: "#f0e8d6", color: "#0d0d0d", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 10, letterSpacing: "0.04em", textTransform: "uppercase", boxShadow: "0 4px 12px rgba(0,0,0,0.15)" }}>Q3 • release</span>
                  </div>
                </div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <div style={{ display: "flex", alignItems: "center" }}>
                  {["MO","NK","TB","SP"].map((ini, k) => (
                    <div key={ini} className="avatar sm" style={{ marginLeft: k > 0 ? -8 : 0, border: "2px solid var(--frame)", zIndex: 4 - k }}>{ini}</div>
                  ))}
                  <span className="pill" style={{ marginLeft: 8, fontSize: 10 }}>+2</span>
                </div>
                <button className="btn sm">Invite</button>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-2)", cursor: "pointer" }}><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
              </div>
            </div>
          </div>

          <div className="main" style={{ flex: 1, overflow: "hidden" }}>
            {/* Chat */}
            <div className="chat-panel">
              <div className="messages">
                <div className="date-div">— Today, Tuesday May 14 —</div>
                <ChatMessage ini="MO" name="Maya Oduya" time="9:14" body="just pushed v3 of the topline. let me know if the bridge lands. ✶" />
                <ChatMessage ini="MO" name="Maya Oduya" time="9:14" audio={{ title: "sundowner_topline_v3.wav", meta: "Maya O. · 1:42" }} />
                <ChatMessage self ini="YT" name="You" time="9:21" body="oh this is the move. the pre is doing exactly what we talked about. one note — can we hold the last word in the bridge a beat longer?" />
                <ChatMessage ini="NK" name="Nia Kassim" time="9:33" body="will track that today. I'll have a stem up by EOD." />
                <ChatMessage ini="TB" name="Theo Brooks" time="9:48" file={{ name: "drum-bus_v2_groove-shift.zip", size: "84 MB · Reaper session" }} />
                <ChatMessage ini="TB" name="Theo Brooks" time="9:48" body="re-cut the hat to push behind the beat. small thing, big feel." />
              </div>

              <div className="composer">
                <div className="composer-inner">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-3)", flexShrink: 0, cursor: "pointer" }}><path d="m21 12-8.5 8.5a5 5 0 1 1-7-7L14 5a3 3 0 1 1 4 4l-9 9a1 1 0 1 1-1.5-1.5L15 8"/></svg>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: "var(--ink-3)", flexShrink: 0, cursor: "pointer" }}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
                  <input className="composer-input" placeholder="Reply to the room…" />
                  <button className="btn primary sm">Send</button>
                </div>
              </div>
            </div>

            {/* Right panel */}
            <div className="right-panel">
              {/* Brief */}
              <div>
                <div className="t-eyebrow" style={{ marginBottom: 10 }}>Brief</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
                  <div className="ph-line" />
                  <div className="ph-line" />
                  <div className="ph-line" style={{ width: "85%" }} />
                  <div className="ph-line" style={{ width: "60%" }} />
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <span className="pill">R&B</span>
                  <span className="pill">Soul</span>
                  <span className="pill accent">Q3 release</span>
                </div>
              </div>

              <div style={{ height: 1, background: "var(--line-soft)" }} />

              {/* Moodboard */}
              <div>
                <div className="t-eyebrow" style={{ marginBottom: 10 }}>Moodboard</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <AlbumArt seed="sundowner-1" size={50} radius={4} />
                  <AlbumArt seed="sundowner-2" size={50} radius={4} />
                  <AlbumArt seed="sundowner-3" size={50} radius={4} />
                  <div style={{ width: 50, height: 50, borderRadius: 4, border: "1.5px dashed var(--line)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--ink-3)", fontFamily: "var(--font-display)", fontSize: 20, cursor: "pointer" }}>+</div>
                </div>
              </div>

              <div style={{ height: 1, background: "var(--line-soft)" }} />

              {/* Members */}
              <div>
                <div className="t-eyebrow" style={{ marginBottom: 10 }}>Members · 6</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {MEMBERS.map(([name, ini, role]) => (
                    <div key={ini} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div className="avatar sm" style={ini === "YT" ? { background: "var(--ink)", color: "var(--frame)" } : {}}>{ini}</div>
                      <div>
                        <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 12 }}>{name}</div>
                        <div className="t-meta">{role}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ height: 1, background: "var(--line-soft)" }} />

              {/* Deadline */}
              <div>
                <div className="t-eyebrow" style={{ marginBottom: 10 }}>Deadline</div>
                <div className="card" style={{ padding: 12 }}>
                  <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-d)" strokeWidth="2"><path d="M12 22s-7-7.5-7-13a7 7 0 1 1 14 0c0 5.5-7 13-7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
                    <div>
                      <div style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 14 }}>Aug 1, 2026</div>
                      <div className="t-meta">Mix lock · 78 days</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ProjectPage />);
  </script>
</body>
</html>
