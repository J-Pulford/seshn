<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seshn — Feed</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <style>
    @import url("https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap");

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f3ef;
      --frame:     #ffffff;
      --surface:   #ffffff;
      --surface-2: #f7f6f3;
      --line:      #d8d6d1;
      --line-soft: #ececea;
      --ink:       #0d0d0d;
      --ink-2:     #3a3a38;
      --ink-3:     #6e6c66;
      --ink-4:     #a4a29c;
      --ph:        #ececea;
      --ph-2:      #e2e0db;
      --accent:    #2CCB73;
      --accent-d:  #1C8F56;
      --accent-m:  #63D89A;
      --accent-bg: #A8EBC8;
      --ink-black: #0D0D0D;
      --ok:        #1C8F56;
      --danger:    #c0392b;
      --r-sm: 4px;
      --r:    8px;
      --r-lg: 14px;
      --r-pill: 999px;
      --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
      --font-body:    "Satoshi", ui-sans-serif, system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ——— Type ——— */
    .t-display { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }
    .t-h1 { font-family: var(--font-display); font-weight: 600; font-size: 32px; line-height: 1.05; letter-spacing: -0.025em; }
    .t-h2 { font-family: var(--font-display); font-weight: 600; font-size: 22px; line-height: 1.15; letter-spacing: -0.02em; }
    .t-h3 { font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.2; letter-spacing: -0.01em; }
    .t-eyebrow { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
    .t-meta { font-size: 11px; color: var(--ink-3); }
    .t-muted { color: var(--ink-3); }
    .t-mute2 { color: var(--ink-4); }

    /* ——— Pills ——— */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: var(--r-pill);
      font-size: 10.5px;
      font-weight: 500;
      font-family: var(--font-display);
      letter-spacing: 0.01em;
      white-space: nowrap;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink-2);
      line-height: 1;
    }
    .pill.accent { background: var(--accent-bg); border-color: transparent; color: var(--accent-d); }
    .pill.solid { background: var(--accent); border-color: transparent; color: #062c19; }
    .pill.success { background: transparent; border-color: var(--accent-d); color: var(--accent-d); }
    .pill.dark { background: var(--ink); color: var(--frame); border-color: transparent; }
    .pill.ghost { background: transparent; }

    /* ——— Buttons ——— */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--r);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-display);
      letter-spacing: -0.005em;
      cursor: pointer;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      line-height: 1;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn.primary { background: var(--accent); color: #062c19; border-color: transparent; }
    .btn.dark { background: var(--ink); color: var(--frame); border-color: transparent; }
    .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
    .btn.sm { padding: 6px 10px; font-size: 11px; }
    .btn:hover { opacity: 0.88; }

    /* ——— Avatar ——— */
    .avatar {
      border-radius: 50%;
      background: var(--ph);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--ink-3);
      flex-shrink: 0;
      position: relative;
    }
    .avatar.sm { width: 28px; height: 28px; font-size: 10px; }
    .avatar.md { width: 36px; height: 36px; font-size: 13px; }
    .avatar.lg { width: 56px; height: 56px; font-size: 18px; }
    .avatar .role-dot {
      position: absolute;
      bottom: -2px; right: -2px;
      background: var(--frame);
      border-radius: var(--r-pill);
      padding: 1px 4px;
      font-size: 7px;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ink);
      border: 1px solid var(--line);
      line-height: 1.4;
      text-transform: uppercase;
    }

    /* ——— Inputs ——— */
    .input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--r);
      border: 1px solid var(--line);
      background: var(--surface);
      font-size: 12px;
      font-family: var(--font-body);
      color: var(--ink);
      outline: none;
    }
    .input:focus { border-color: var(--ink); }

    /* ——— Card ——— */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 14px;
    }

    /* ——— Gig card ——— */
    .gig {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .gig.boost {
      border-color: var(--accent-d);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-bg) 40%, var(--surface)) 0%, var(--surface) 60%);
    }

    /* ——— Layout helpers ——— */
    .row { display: flex; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; }
    .between { display: flex; align-items: center; justify-content: space-between; }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-4); display: inline-block; }

    /* ——— Logo ——— */
    .logo {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.04em;
      font-size: 18px;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .logo::before {
      content: "";
      width: 14px; height: 14px;
      border-radius: 3px;
      background: var(--accent);
      display: inline-block;
      box-shadow: 0 0 0 2px var(--frame), 0 0 0 3px var(--ink);
      margin-right: 2px;
      flex-shrink: 0;
    }

    /* ——— Dividers ——— */
    .divider { height: 1px; background: var(--line-soft); }
    .ph-line { background: var(--ph); border-radius: 2px; height: 8px; }
    .ph-line.sm { height: 6px; }

    /* Audio player */
    .audio {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: var(--surface);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .audio .play-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      border: none;
    }
    .audio .play-btn::before {
      content: ""; width: 0; height: 0;
      border-left: 8px solid var(--accent);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      margin-left: 3px;
    }

    /* ——— Scrollbars ——— */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    /* ——— Checkbox ——— */
    .check-box {
      width: 14px; height: 14px;
      border-radius: 3px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .check-box.checked { background: var(--ink); border-color: var(--ink); }
    .radio-btn {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1px solid var(--line);
      display: inline-block;
      flex-shrink: 0;
      cursor: pointer;
    }
    .radio-btn.checked { background: var(--ink); border-color: var(--ink); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/seshn-supabase.js"></script>
  <script src="../js/seshn-nav.js"></script>

  <script type="text/babel">
    // ——— Helpers ———
    function _hash(s) {
      let h = 2166136261 >>> 0;
      s = String(s || "x");
      for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
      return h >>> 0;
    }
    function _rng(seed) {
      let s = seed >>> 0;
      return () => {
        s = (s + 0x6D2B79F5) >>> 0; let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    const V_PAL = {
      cream:"#f0e8d6", bone:"#f4f1e9", rust:"#d96e3f", plum:"#5b3858",
      forest:"#2a4d3a", ink:"#0d0d0d", navy:"#1f3a5f", mint:"#a8ebc8",
      lime:"#c4e83a", cherry:"#c43d3f", green:"#2CCB73", deep:"#1C8F56",
      butter:"#f6d36b", fog:"#c9d3d2",
    };
    const COVER_PALETTES = [
      [V_PAL.plum,   V_PAL.cream,  V_PAL.rust],
      [V_PAL.cream,  V_PAL.ink,    V_PAL.rust],
      [V_PAL.forest, V_PAL.mint,   V_PAL.butter],
      [V_PAL.navy,   V_PAL.bone,   V_PAL.butter],
      [V_PAL.ink,    V_PAL.lime,   V_PAL.mint],
      [V_PAL.cherry, V_PAL.cream,  V_PAL.ink],
      [V_PAL.bone,   V_PAL.plum,   V_PAL.rust],
      [V_PAL.rust,   V_PAL.cream,  V_PAL.ink],
      [V_PAL.green,  V_PAL.ink,    V_PAL.bone],
      [V_PAL.mint,   V_PAL.forest, V_PAL.ink],
    ];

    // ——— AlbumArt ———
    const AlbumArt = ({ seed = "track", size = 56, variant, radius = 6, style }) => {
      const h = _hash(seed);
      const v = variant != null ? variant : h % 8;
      const pal = COVER_PALETTES[((h >>> 3) % COVER_PALETTES.length)];
      const [bg, fg, ac] = pal;
      const rng = _rng(h);
      const wrap = { width: size, height: size, borderRadius: radius, overflow: "hidden", flexShrink: 0, display: "inline-block", ...style };
      let inner;
      if (v === 0) {
        const cy = 38 + (rng() - 0.5) * 16;
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><circle cx="50" cy={cy} r="26" fill={ac}/><rect x="0" y="68" width="100" height="6" fill={fg}/><rect x="0" y="78" width="100" height="2" fill={fg} opacity="0.45"/></svg>;
      } else if (v === 1) {
        const dots = [];
        for (let y=0;y<10;y++) for(let x=0;x<10;x++){const d=(x+y)/18;const r=Math.max(0.4,4.2*(1-d)+rng()*0.4);dots.push(<circle key={x+"_"+y} cx={5+x*10} cy={5+y*10} r={r} fill={fg}/>);}
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{dots}</svg>;
      } else if (v === 2) {
        const letter = (seed[0]||"S").toUpperCase();
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><text x="50" y="72" textAnchor="middle" fontFamily="General Sans,sans-serif" fontWeight="700" fontSize="86" letterSpacing="-3" fill={fg}>{letter}</text><rect x="14" y="84" width="72" height="4" fill={ac}/></svg>;
      } else if (v === 3) {
        const bars=[];for(let i=0;i<28;i++){const t=i/27;const env=Math.sin(t*Math.PI)**0.6;const a=10+rng()*80*env;bars.push(<rect key={i} x={5+i*3.4} y={50-a/2} width="2" height={a} fill={fg} rx="1"/>);}
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{bars}<rect x="6" y="86" width="40" height="2" fill={ac}/></svg>;
      } else if (v === 4) {
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><polygon points="0,0 100,0 0,100" fill={fg}/><circle cx="50" cy="50" r="18" fill={ac}/></svg>;
      } else if (v === 5) {
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/>{[36,26,16].map((r,i)=><circle key={i} cx="50" cy="50" r={r} fill="none" stroke={fg} strokeWidth={i===1?2:1.2} opacity={0.85-i*0.1}/>)}<circle cx={50+36*Math.cos(((h>>>5)%360)*Math.PI/180)} cy={50+36*Math.sin(((h>>>5)%360)*Math.PI/180)} r="5" fill={ac}/></svg>;
      } else if (v === 6) {
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="100" fill={bg}/><rect x="18" y="22" width="58" height="58" fill={ac}/><rect x="26" y="30" width="58" height="58" fill={fg} opacity="0.85"/><rect x="34" y="38" width="58" height="58" fill={ac} opacity="0.6"/></svg>;
      } else {
        inner = <svg viewBox="0 0 100 100" width="100%" height="100%"><rect width="100" height="55" fill={bg}/><rect y="55" width="100" height="45" fill={fg}/><circle cx="50" cy="55" r="20" fill={ac}/><rect x="0" y="55" width="100" height="1.5" fill={ac} opacity="0.4"/></svg>;
      }
      return <div style={wrap}>{inner}</div>;
    };

    // ——— Waveform ———
    const Waveform = ({ seed="wf", height=28, bars=56, progress=0.32, style }) => {
      const h=_hash(seed); const rng=_rng(h); const arr=[];
      for(let i=0;i<bars;i++){const t=i/(bars-1);const env=0.35+0.65*(Math.sin(t*Math.PI)**0.6);arr.push((0.18+0.82*rng())*env);}
      const W=bars*3; const gap=1.2; const bw=(W/bars)-gap;
      return <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" width="100%" height={height} style={{display:"block",...style}}>
        {arr.map((a,i)=>{const x=i*(W/bars);const bh=Math.max(2,a*height);const y=(height-bh)/2;const isPlayed=(i/bars)<progress;return <rect key={i} x={x} y={y} width={bw} height={bh} fill={isPlayed?"var(--ink)":"rgba(0,0,0,0.18)"} rx={bw/2}/>;})}</svg>;
    };

    // ——— Icon ———
    const SVGS = {
      search: `<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>`,
      bell:   `<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9'/><path d='M10 21a2 2 0 0 0 4 0'/></svg>`,
      message:`<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M21 12a8 8 0 0 1-12 7l-5 1 1-5a8 8 0 1 1 16-3z'/></svg>`,
      check:  `<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5'><path d='M5 12l5 5L20 7'/></svg>`,
      sliders:`<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M4 6h16M4 12h16M4 18h16'/><circle cx='9' cy='6' r='2'/><circle cx='15' cy='12' r='2'/><circle cx='8' cy='18' r='2'/></svg>`,
      user:   `<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='12' cy='8' r='4'/><path d='M4 21c1.5-4 4.5-6 8-6s6.5 2 8 6'/></svg>`,
      chevron:`<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='m9 6 6 6-6 6'/></svg>`,
    };
    const Icon = ({ kind, size=16, style={} }) => {
      const svg = SVGS[kind] || SVGS.check;
      return <span style={{ width:size, height:size, display:"inline-flex", alignItems:"center", justifyContent:"center", flexShrink:0, ...style }} dangerouslySetInnerHTML={{__html:svg}} />;
    };

    // TopNav now comes from window.SeshnAppNav (../js/seshn-nav.js).
    const TopNav = () => <SeshnAppNav active="feed" />;

    // ——— Filter Group ———
    const FilterGroup = ({ title, items, radio }) => (
      <div className="col" style={{ gap:8 }}>
        <span className="t-eyebrow">{title}</span>
        <div className="col" style={{ gap:2 }}>
          {items.map(([label, count, sel]) => (
            <label key={label} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"5px 0", cursor:"pointer" }}>
              <div className="row" style={{ gap:8 }}>
                {radio ? (
                  <span className={"radio-btn" + (sel ? " checked" : "")} />
                ) : (
                  <span className={"check-box" + (sel ? " checked" : "")}>
                    {sel && <Icon kind="check" size={9} style={{ color:"var(--frame)" }} />}
                  </span>
                )}
                <span style={{ fontSize:12.5, color:sel?"var(--ink)":"var(--ink-2)" }}>{label}</span>
              </div>
              {count && <span className="t-meta">{count}</span>}
            </label>
          ))}
        </div>
      </div>
    );

    // ——— Helpers ———
    function timeAgo(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      const s = Math.floor((Date.now() - d.getTime()) / 1000);
      if (s < 60) return s + "s";
      const m = Math.floor(s / 60); if (m < 60) return m + "m";
      const h = Math.floor(m / 60); if (h < 24) return h + "h";
      const days = Math.floor(h / 24); if (days < 30) return days + "d";
      return d.toLocaleDateString();
    }
    function deadlineLabel(date) {
      if (!date) return "no deadline";
      const d = new Date(date);
      const days = Math.ceil((d.getTime() - Date.now()) / 86400000);
      if (days < 0) return "closed";
      if (days === 0) return "closes today";
      if (days === 1) return "1 day left";
      return days + " days left";
    }
    function compLabel(g) {
      if (g.comp === "paid" && g.pay_amount) return "Paid · $" + Number(g.pay_amount).toLocaleString();
      if (g.comp === "paid") return "Paid";
      if (g.comp === "split") return "Split";
      if (g.comp === "trade") return "Trade";
      return "Unpaid";
    }
    function initialsOf(name) {
      if (!name) return "··";
      return name.trim().split(/\s+/).map(s => s[0]).join("").slice(0, 2).toUpperCase();
    }

    // ——— Gig Card ———
    const GigCard = ({ gig, boost, art, role="Vocalist", title="Gig title", desc, tags=[], comp="Paid", time="2h", name="Artist", initials="A", roleTag="PRO", applied=0 }) => (
      <div className={"gig" + (boost?" boost":"")}>
        <div className="row" style={{ gap:10 }}>
          <span className="avatar md" style={{ background:"var(--ph-2)" }}>
            {initials}
            <span className="role-dot">{roleTag}</span>
          </span>
          <div className="col" style={{ flex:1, gap:2, minWidth:0 }}>
            <div className="row" style={{ gap:6 }}>
              <span style={{ fontWeight:600, fontFamily:"var(--font-display)", fontSize:13 }}>{name}</span>
              <span className="dot" />
              <span className="t-meta">{time} ago</span>
              {boost && <span className="pill solid" style={{ marginLeft:"auto", fontSize:9 }}>★ Boosted</span>}
            </div>
            <div className="row" style={{ gap:6 }}>
              <span className="pill accent">{role} needed</span>
              <span className="t-meta">· {comp}</span>
            </div>
          </div>
          {art && <AlbumArt seed={art===true?title:art} size={48} radius={6} />}
        </div>
        <div style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:16, letterSpacing:"-0.012em", lineHeight:1.2 }}>{title}</div>
        {desc !== false && desc && (
          <div style={{ fontSize:13, color:"var(--ink-2)", lineHeight:1.5, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{desc}</div>
        )}
        <div className="row" style={{ gap:6, flexWrap:"wrap" }}>
          {tags.map(t => <span key={t} className="pill">{t}</span>)}
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, paddingTop:10, borderTop:"1px solid var(--line-soft)" }}>
          <span className="t-meta">{applied} applied · {gig ? deadlineLabel(gig.deadline) : "3 days left"}</span>
          <div className="row" style={{ gap:8 }}>
            <a href={gig ? "gig.html?id=" + encodeURIComponent(gig.id) : "gig.html"} className="btn sm">View</a>
            <a href={gig ? "gig.html?id=" + encodeURIComponent(gig.id) : "gig.html"} className="btn primary sm">Apply</a>
          </div>
        </div>
      </div>
    );

    // ——— Right Rail Suggestion ———
    const SuggestedArtist = ({ name, initials, sub, tag }) => (
      <div className="row" style={{ gap:10 }}>
        <a href="profile.html">
          <span className="avatar md" style={{ background:"var(--ph-2)" }}>{initials}</span>
        </a>
        <div className="col" style={{ gap:1, flex:1, minWidth:0 }}>
          <a href="profile.html" style={{ fontFamily:"var(--font-display)", fontSize:12.5, fontWeight:600, color:"var(--ink)", textDecoration:"none" }}>{name}</a>
          <span className="t-meta">{sub}</span>
        </div>
        <button className="btn sm">Follow</button>
      </div>
    );

    // ——— Main Feed App ———
    const FeedApp = () => {
      const [gigs, setGigs] = React.useState(null); // null = loading
      const [err, setErr] = React.useState("");

      React.useEffect(() => {
        if (!window.seshn) { setErr("Supabase client failed to load."); setGigs([]); return; }
        window.seshn.listGigs({ limit: 30 })
          .then(list => setGigs(list))
          .catch(e => { setErr(e.message || "Couldn't load feed."); setGigs([]); });
      }, []);

      return (
      <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column" }}>
        <TopNav />
        <div style={{ display:"grid", gridTemplateColumns:"240px 1fr 300px", gap:24, padding:"24px 28px", flex:1, maxWidth:1400, margin:"0 auto", width:"100%" }}>

          {/* ——— Left Sidebar: Filters ——— */}
          <aside style={{ position:"sticky", top:82, height:"calc(100vh - 100px)", overflowY:"auto", paddingRight:4 }}>
            <div className="col" style={{ gap:22 }}>
              <FilterGroup title="Role needed" items={[
                ["Vocalist", 142, true],
                ["Producer", 88, false],
                ["Mixing engineer", 41, true],
                ["Drummer", 22, false],
                ["Songwriter", 67, false],
                ["Guitarist", 35, false],
              ]} />
              <div style={{ height:1, background:"var(--line-soft)" }} />
              <FilterGroup title="Compensation" radio items={[
                ["Paid", 218, true],
                ["Split / royalty", 84, false],
                ["Trade / barter", 19, false],
                ["Unpaid", 12, false],
              ]} />
              <div style={{ height:1, background:"var(--line-soft)" }} />
              <FilterGroup title="Genre" items={[
                ["R&B", 92, true],
                ["Afrobeats", 38, true],
                ["Hip-hop", 121, false],
                ["Indie", 88, false],
                ["Electronic", 57, false],
                ["Soul", 44, false],
              ]} />
              <div style={{ height:1, background:"var(--line-soft)" }} />
              <FilterGroup title="Location" radio items={[
                ["Remote OK", 184, true],
                ["Near me", 47, false],
                ["My city", 12, false],
              ]} />
              <button className="btn" style={{ width:"100%", marginTop:4 }}>Clear all filters</button>
            </div>
          </aside>

          {/* ——— Main Feed ——— */}
          <main style={{ minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
              <div>
                <h1 style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:22, letterSpacing:"-0.02em" }}>
                  Live feed <span style={{ fontSize:13, color:"var(--ink-3)", fontWeight:400 }}>· 24 new today</span>
                </h1>
              </div>
              <div className="row" style={{ gap:6 }}>
                <span className="pill ghost" style={{ cursor:"pointer" }}>Newest</span>
                <span className="pill" style={{ background:"var(--ink)", color:"var(--frame)", borderColor:"transparent", cursor:"pointer" }}>Recommended</span>
              </div>
            </div>
            <div className="col" style={{ gap:14 }}>
              {gigs === null ? (
                <div style={{ padding: "60px 0", textAlign: "center", color: "var(--ink-3)", fontFamily: "var(--font-display)", fontSize: 13 }}>
                  Loading gigs…
                </div>
              ) : gigs.length === 0 ? (
                <div className="gig" style={{ alignItems: "center", textAlign: "center", padding: "40px 20px", gap: 12 }}>
                  <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 22, color: "var(--ink)" }}>Feed's quiet right now.</div>
                  <div style={{ color: "var(--ink-3)", fontSize: 14, maxWidth: 380 }}>Be the first to post a brief — once others sign up and post, their gigs will show up here.</div>
                  <a href="post.html" className="btn primary" style={{ marginTop: 6 }}>+ Post the first gig</a>
                  {err && <div style={{ color: "var(--danger)", fontSize: 12, marginTop: 8 }}>{err}</div>}
                </div>
              ) : (
                gigs.map(g => {
                  const owner = g.owner || {};
                  const isBoosted = g.boosted_until && new Date(g.boosted_until) > new Date();
                  return (
                    <GigCard
                      key={g.id}
                      gig={g}
                      boost={!!isBoosted}
                      art={isBoosted || (g.genres && g.genres.length) ? (g.title || "art") : null}
                      role={g.role || "Collaborator"}
                      title={g.title}
                      desc={g.description}
                      tags={(g.genres || []).slice(0, 4)}
                      comp={compLabel(g)}
                      name={owner.display_name || "Artist"}
                      initials={initialsOf(owner.display_name)}
                      roleTag={owner.is_pro ? "PRO" : "ART"}
                      time={timeAgo(g.created_at)}
                      applied={0}
                    />
                  );
                })
              )}
            </div>
          </main>

          {/* ——— Right Rail ——— */}
          <aside style={{ position:"sticky", top:82, height:"calc(100vh - 100px)", overflowY:"auto" }}>
            <div className="col" style={{ gap:18 }}>
              {/* Suggested artists */}
              <div>
                <div style={{ fontFamily:"var(--font-display)", fontSize:10, fontWeight:500, letterSpacing:"0.14em", textTransform:"uppercase", color:"var(--ink-3)", marginBottom:12 }}>Suggested for you</div>
                <div className="col" style={{ gap:12 }}>
                  <SuggestedArtist name="Nia Kassim" initials="NK" sub="Vocalist · London" tag="R&B" />
                  <SuggestedArtist name="Sam Park" initials="SP" sub="Mixing eng. · LA" tag="Indie" />
                  <SuggestedArtist name="Lina Vega" initials="LV" sub="Producer · CDMX" tag="Electronic" />
                  <SuggestedArtist name="Mo Daniels" initials="MD" sub="Drummer · NYC" tag="Soul" />
                  <SuggestedArtist name="Robi K." initials="RK" sub="Songwriter · Berlin" tag="Pop" />
                </div>
                <button className="btn ghost" style={{ marginTop:10, fontSize:11, padding:"4px 0", color:"var(--ink-3)" }}>See all suggestions →</button>
              </div>

              <div style={{ height:1, background:"var(--line-soft)" }} />

              {/* Pro upsell */}
              <div className="card" style={{ background:"var(--accent-bg)", borderColor:"transparent", padding:16 }}>
                <div style={{ fontFamily:"var(--font-display)", fontSize:10, fontWeight:500, letterSpacing:"0.14em", textTransform:"uppercase", color:"var(--accent-d)", marginBottom:6 }}>Go Pro</div>
                <div style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:14, color:"var(--accent-d)", lineHeight:1.3, marginBottom:10 }}>
                  Message anyone first, unlock analytics, get the verified badge.
                </div>
                <button className="btn dark sm">Upgrade — $5/mo</button>
              </div>

              <div style={{ height:1, background:"var(--line-soft)" }} />

              {/* Browse link */}
              <div>
                <div style={{ fontFamily:"var(--font-display)", fontSize:10, fontWeight:500, letterSpacing:"0.14em", textTransform:"uppercase", color:"var(--ink-3)", marginBottom:10 }}>Looking for artists?</div>
                <a href="browse.html" className="btn" style={{ width:"100%", justifyContent:"center" }}>Browse artists →</a>
              </div>
            </div>
          </aside>
        </div>
      </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<FeedApp />);
  </script>
</body>
</html>
